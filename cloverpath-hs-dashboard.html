      if (name && majorCatalog[name] && !seen[name]) { seen[name] = true; out.push(name); }
    }
    var i;
    for (i = 0; i < w.majors_saved.length; i++) push(w.majors_saved[i]);
    for (i = 0; i < w.majors_viewed.length; i++) push(w.majors_viewed[i]);
    var rest = Object.keys(majorCatalog).sort();
    for (i = 0; i < rest.length; i++) push(rest[i]);
    return out;
  }

  function schoolKeyOf(r) {
    var name = r['school.name'] || '';
    var city = r['school.city'] || '';
    var st = r['school.state'] || '';
    return name + '_' + city + '_' + st;
  }

  // Direct school profile when we have the Scorecard unit id (same
  // pattern as the aptitude module); name search as the fallback for
  // schools saved before the id was captured.
  function scorecardUrl(id, name) {
    return id
      ? 'https://collegescorecard.ed.gov/school/?' + encodeURIComponent(String(id))
      : 'https://collegescorecard.ed.gov/search/?search=' + encodeURIComponent(name || '');
  }

  function renderSchools(data) {
    var w = data.working;
    var root = el('cp-screen-schools');

    if (!schoolsPrefs.major) {
      // Default program context: first saved major, else first viewed.
      var opts = majorOptionsFor(w);
      schoolsPrefs.major = opts.length ? opts[0] : null;
    }

    var savedHtml = '';
    for (var i = 0; i < w.schools_saved.length; i++) {
      var s = w.schools_saved[i];
      var sUrl = s.url ? (s.url.indexOf('http') === 0 ? s.url : 'https://' + s.url) : '';
      savedHtml += '<div class="cp-item-card" style="cursor:default">' +
        '<div class="cp-state-tags"><span class="cp-state-tag cp-tag-saved">Saved</span></div>' +
        '<div class="cp-item-icon">' + icon('grad') + '</div>' +
        '<div class="cp-item-name">' + escapeHtml(s.name) + '</div>' +
        '<div class="cp-item-blurb">' + escapeHtml([s.city, s.state].filter(Boolean).join(', ')) + '</div>' +
        '<div class="cp-action-row" style="margin-top:8px">' +
          (sUrl ? '<a class="cp-action-btn cp-btn-compare" style="padding:7px 15px;font-size:13px;text-decoration:none" href="' + escapeHtml(sUrl) + '" target="_blank" rel="noopener">Website</a>' : '') +
          '<a class="cp-action-btn cp-btn-compare" style="padding:7px 15px;font-size:13px;text-decoration:none" href="' + escapeHtml(scorecardUrl(s.scorecard_id, s.name)) + '" target="_blank" rel="noopener">Scorecard</a>' +
        '</div></div>';
    }

    var majorOpts = majorOptionsFor(w);
    var optHtml = '';
    for (i = 0; i < majorOpts.length; i++) {
      var name = majorOpts[i];
      var tag = w.majors_saved.indexOf(name) !== -1 ? ' (saved)' : (w.majors_viewed.indexOf(name) !== -1 ? ' (viewed)' : '');
      optHtml += '<option value="' + escapeHtml(name) + '"' + (schoolsPrefs.major === name ? ' selected' : '') + '>' + escapeHtml(name + tag) + '</option>';
    }

    var stateChips = '';
    for (i = 0; i < schoolsPrefs.states.length; i++) {
      stateChips += '<button class="cp-chip cp-active" data-state-remove="' + escapeHtml(schoolsPrefs.states[i]) + '" type="button">' + escapeHtml(schoolsPrefs.states[i]) + ' \u00d7</button>';
    }
    var stateOptions = '<option value="">Add a state...</option>';
    for (i = 0; i < US_STATES.length; i++) {
      if (schoolsPrefs.states.indexOf(US_STATES[i]) !== -1) continue;
      stateOptions += '<option value="' + US_STATES[i] + '">' + US_STATES[i] + '</option>';
    }

    function chipRow(label, list, values, attr) {
      var html = '<div class="cp-filter-row" style="margin-bottom:8px"><span class="cp-item-meta">' + label + ':</span>';
      for (var j = 0; j < values.length; j++) {
        var on = list.indexOf(values[j]) !== -1;
        html += '<button class="cp-chip' + (on ? ' cp-active' : '') + '" data-' + attr + '="' + escapeHtml(values[j]) + '" type="button">' + escapeHtml(values[j]) + '</button>';
      }
      return html + '</div>';
    }

    var resultsHtml;
    if (schoolSearchBusy) {
      resultsHtml = '<div class="cp-empty">Searching real schools...</div>';
    } else if (schoolSearchError) {
      resultsHtml = '<div class="cp-empty">' + escapeHtml(schoolSearchError) + '</div>';
    } else if (schoolResults === null) {
      resultsHtml = '<div class="cp-empty">Pick a major and run a search. Results come from the U.S. Department of Education\u2019s College Scorecard, so these are real schools with real programs.</div>';
    } else {
      var campusList = schoolsPrefs.campuses;
      var shown = schoolResults.filter(function (r) {
        if (!campusList.length) return true;
        return campusList.indexOf(getCampusSetting(r['school.locale'])) !== -1;
      });
      if (!shown.length) {
        resultsHtml = '<div class="cp-empty">No schools matched. Widen the radius, drop a filter, or try state mode.</div>';
      } else {
        resultsHtml = '<p class="cp-item-meta" style="margin-bottom:10px">' + shown.length + ' school' + (shown.length === 1 ? '' : 's') + ' found for ' + escapeHtml(schoolsPrefs.major || '') + '</p><div class="cp-item-grid">';
        for (i = 0; i < shown.length; i++) {
          var r = shown[i];
          var key = schoolKeyOf(r);
          var isSaved = w.schools_saved.some(function (x) { return x.key === key || x.name === r['school.name']; });
          var size = r['latest.student.size'];
          var url = r['school.school_url'] || '';
          var scUrl = scorecardUrl(r.id, r['school.name']);
          resultsHtml += '<div class="cp-item-card cp-school-card" style="cursor:default">' +
            (isSaved ? '<div class="cp-state-tags"><span class="cp-state-tag cp-tag-saved">Saved</span></div>' : '') +
            '<div class="cp-item-name">' + escapeHtml(r['school.name'] || '') + '</div>' +
            '<div class="cp-item-blurb">' + escapeHtml([r['school.city'], r['school.state']].filter(Boolean).join(', ')) +
              (size ? ' \u00b7 ' + escapeHtml(getSizeLabel(size)) + ' (' + Number(size).toLocaleString() + ' students)' : '') +
              ' \u00b7 ' + escapeHtml(getCampusSetting(r['school.locale'])) + '</div>' +
            (schoolsPrefs.useProgram ? '<div class="cp-item-meta">Offers programs in this field</div>' : '') +
            '<div class="cp-action-row" style="margin-top:8px">' +
              (isSaved ? '' : '<button class="cp-action-btn cp-btn-save" data-save-school="' + escapeHtml(key) + '" data-school-name="' + escapeHtml(r['school.name'] || '') + '" data-school-city="' + escapeHtml(r['school.city'] || '') + '" data-school-state="' + escapeHtml(r['school.state'] || '') + '" data-school-id="' + escapeHtml(r.id ? String(r.id) : '') + '" data-school-url="' + escapeHtml(url) + '" type="button" style="padding:7px 15px;font-size:13px">' + icon('bookmark') + 'Save</button>') +
              (url ? '<a class="cp-action-btn cp-btn-compare" style="padding:7px 15px;font-size:13px;text-decoration:none" href="' + escapeHtml(url.indexOf('http') === 0 ? url : 'https://' + url) + '" target="_blank" rel="noopener">Website</a>' : '') +
              '<a class="cp-action-btn cp-btn-compare" style="padding:7px 15px;font-size:13px;text-decoration:none" href="' + escapeHtml(scUrl) + '" target="_blank" rel="noopener">Scorecard</a>' +
            '</div></div>';
        }
        resultsHtml += '</div>';
      }
    }

    root.innerHTML =
      '<div class="cp-eyebrow">My Schools</div>' +
      '<h2 class="cp-section-title">Real schools that teach what you want to learn</h2>' +
      '<p class="cp-section-sub">Search live College Scorecard data for schools offering programs in one of your majors.</p>' +
      '<div class="cp-stack">' +
        (savedHtml ? '<div class="cp-card"><div class="cp-eyebrow">Your shortlist</div><h3 class="cp-section-title" style="font-size:19px">Saved schools</h3><div class="cp-item-grid" style="margin-top:12px">' + savedHtml + '</div></div>' : '') +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">School search</div>' +
          '<h3 class="cp-section-title" style="font-size:19px">Find schools for a major</h3>' +
          '<div class="cp-search-grid">' +
            '<label class="cp-search-label">Major<select class="cp-input" id="cp-sch-major">' + optHtml + '</select></label>' +
            '<label class="cp-search-label">Search by<select class="cp-input" id="cp-sch-mode">' +
              '<option value="zip"' + (schoolsPrefs.mode === 'zip' ? ' selected' : '') + '>Near a ZIP code</option>' +
              '<option value="state"' + (schoolsPrefs.mode === 'state' ? ' selected' : '') + '>By state</option>' +
            '</select></label>' +
            (schoolsPrefs.mode === 'zip'
              ? '<label class="cp-search-label">ZIP code<input class="cp-input" id="cp-sch-zip" inputmode="numeric" maxlength="5" placeholder="e.g. 78701" value="' + escapeHtml(schoolsPrefs.zip) + '"></label>' +
                '<label class="cp-search-label">Radius<select class="cp-input" id="cp-sch-radius">' +
                  ['10', '25', '50', '100', '250'].map(function (rr) { return '<option value="' + rr + '"' + (schoolsPrefs.radius === rr ? ' selected' : '') + '>' + rr + ' miles</option>'; }).join('') +
                '</select></label>'
              : '<label class="cp-search-label">States<select class="cp-input" id="cp-sch-state">' + stateOptions + '</select></label>' +
                '<div class="cp-search-label"><span style="visibility:hidden">.</span><div class="cp-filter-row" style="margin:0">' + (stateChips || '<span class="cp-item-meta">No states added yet</span>') + '</div></div>') +
          '</div>' +
          chipRow('Size', schoolsPrefs.sizes, ['Small', 'Medium', 'Large'], 'size-chip') +
          chipRow('Campus', schoolsPrefs.campuses, ['City', 'Suburban', 'Town', 'Rural'], 'campus-chip') +
          '<div class="cp-filter-row" style="margin-bottom:12px">' +
            '<button class="cp-chip' + (schoolsPrefs.useProgram ? ' cp-active' : '') + '" id="cp-sch-program" type="button">Only schools with this program</button>' +
          '</div>' +
          '<button class="cp-action-btn cp-btn-save" id="cp-sch-search" type="button">' + icon('map') + (schoolSearchBusy ? 'Searching...' : 'Search schools') + '</button>' +
          '<p class="cp-xp-hint">Your first real search and a shortlist of three schools are both milestones on your path.</p>' +
        '</div>' +
        '<div class="cp-card"><div class="cp-eyebrow">Results</div>' + resultsHtml + '</div>' +
      '</div>';

    // Wiring
    var mSel = el('cp-sch-major');
    if (mSel) mSel.addEventListener('change', function () { schoolsPrefs.major = mSel.value; });
    var modeSel = el('cp-sch-mode');
    if (modeSel) modeSel.addEventListener('change', function () { schoolsPrefs.mode = modeSel.value; renderSchools(recompute(null, { silent: true })); });
    var zipIn = el('cp-sch-zip');
    if (zipIn) zipIn.addEventListener('input', function () { schoolsPrefs.zip = zipIn.value; });
    var radSel = el('cp-sch-radius');
    if (radSel) radSel.addEventListener('change', function () { schoolsPrefs.radius = radSel.value; });
    var stSel = el('cp-sch-state');
    if (stSel) stSel.addEventListener('change', function () {
      if (stSel.value && schoolsPrefs.states.indexOf(stSel.value) === -1 && schoolsPrefs.states.length < 5) {
        schoolsPrefs.states.push(stSel.value);
      }
      renderSchools(recompute(null, { silent: true }));
    });
    bind('#cp-screen-schools [data-state-remove]', function (btn) {
      var v = btn.getAttribute('data-state-remove');
      var idx = schoolsPrefs.states.indexOf(v);
      if (idx > -1) schoolsPrefs.states.splice(idx, 1);
      renderSchools(recompute(null, { silent: true }));
    });
    bind('#cp-screen-schools [data-size-chip]', function (btn) {
      var v = btn.getAttribute('data-size-chip');
      var idx = schoolsPrefs.sizes.indexOf(v);
      if (idx > -1) schoolsPrefs.sizes.splice(idx, 1); else schoolsPrefs.sizes.push(v);
      renderSchools(recompute(null, { silent: true }));
    });
    bind('#cp-screen-schools [data-campus-chip]', function (btn) {
      var v = btn.getAttribute('data-campus-chip');
      var idx = schoolsPrefs.campuses.indexOf(v);
      if (idx > -1) schoolsPrefs.campuses.splice(idx, 1); else schoolsPrefs.campuses.push(v);
      renderSchools(recompute(null, { silent: true }));
    });
    var progBtn = el('cp-sch-program');
    if (progBtn) progBtn.addEventListener('click', function () {
      schoolsPrefs.useProgram = !schoolsPrefs.useProgram;
      renderSchools(recompute(null, { silent: true }));
    });
    var searchBtn = el('cp-sch-search');
    if (searchBtn) searchBtn.addEventListener('click', searchSchools);
    bind('#cp-screen-schools [data-save-school]', function (btn) {
      var key = btn.getAttribute('data-save-school');
      var exists = state.saves.schools.some(function (x) { return x.key === key; });
      if (!exists) {
        state.saves.schools.push({
          key: key,
          name: btn.getAttribute('data-school-name'),
          city: btn.getAttribute('data-school-city'),
          state: btn.getAttribute('data-school-state'),
          scorecard_id: btn.getAttribute('data-school-id') || '',
          url: btn.getAttribute('data-school-url') || ''
        });
        saveState();
        trackAppend('schools_saved', btn.getAttribute('data-school-name'));
        recompute('School saved to your shortlist.');
      }
      renderSchools(recompute(null, { silent: true }));
    });
  }

  // With keys_nested=true (the program-filter path) the Scorecard API
  // returns nested objects instead of flat dotted keys. Normalize every
  // result to the flat shape the renderer reads.
  function normalizeSchoolResult(r) {
    if (!r || r['school.name'] || !r.school) return r;
    var out = { id: r.id };
    out['school.name'] = r.school.name || '';
    out['school.city'] = r.school.city || '';
    out['school.state'] = r.school.state || '';
    out['school.school_url'] = r.school.school_url || '';
    out['school.locale'] = r.school.locale;
    if (r.latest && r.latest.student) out['latest.student.size'] = r.latest.student.size;
    return out;
  }

  function searchSchools() {
    if (schoolSearchBusy) return;
    var majorName = schoolsPrefs.major;
    if (!majorName) { schoolSearchError = 'Pick a major first.'; renderSchools(recompute(null, { silent: true })); return; }
    if (schoolsPrefs.mode === 'zip' && !/^[0-9]{5}$/.test(schoolsPrefs.zip.trim())) {
      schoolSearchError = 'Enter a valid 5-digit ZIP code.';
      renderSchools(recompute(null, { silent: true }));
      return;
    }
    if (schoolsPrefs.mode === 'state' && schoolsPrefs.states.length === 0) {
      schoolSearchError = 'Add at least one state.';
      renderSchools(recompute(null, { silent: true }));
      return;
    }

    var clusterId = (majorCatalog[majorName] || {}).clusterId;
    var cip4List = resolveCip4(majorName, clusterId);

    var baseParams = {
      per_page: '25',
      fields: ['id', 'school.name', 'school.city', 'school.state', 'school.school_url', 'school.locale', 'latest.student.size', 'latest.programs.cip_4_digit.code', 'latest.programs.cip_4_digit.title'].join(',')
    };
    if (schoolsPrefs.mode === 'zip') {
      baseParams.zip = schoolsPrefs.zip.trim();
      baseParams.distance = schoolsPrefs.radius + 'mi';
    }

    var locationVariants = (schoolsPrefs.mode === 'state') ? schoolsPrefs.states.slice() : [null];
    var sizeVariants = schoolsPrefs.sizes.length ? schoolsPrefs.sizes.map(getSizeRangeParam).filter(Boolean) : [null];
    var cipVariants = (schoolsPrefs.useProgram && cip4List.length) ? cip4List : [null];

    var urls = [];
    for (var li = 0; li < locationVariants.length; li++) {
      for (var si = 0; si < sizeVariants.length; si++) {
        for (var ci = 0; ci < cipVariants.length; ci++) {
          var p = [];
          for (var k in baseParams) p.push(encodeURIComponent(k) + '=' + encodeURIComponent(baseParams[k]));
          if (locationVariants[li]) p.push('school.state=' + encodeURIComponent(locationVariants[li]));
          if (sizeVariants[si]) p.push('latest.student.size__range=' + encodeURIComponent(sizeVariants[si]));
          if (cipVariants[ci]) {
            p.push('all_programs_nested=true');
            p.push('keys_nested=true');
            p.push('latest.programs.cip_4_digit.code=' + encodeURIComponent(cipVariants[ci]));
          }
          urls.push(SCORECARD_URL + '?' + p.join('&'));
        }
      }
    }

    schoolSearchBusy = true;
    schoolSearchError = '';
    renderSchools(recompute(null, { silent: true }));

    var headers = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON };
    var CONCURRENCY = 6;
    var all = [];

    function runBatch(startIdx) {
      var batch = urls.slice(startIdx, startIdx + CONCURRENCY);
      if (!batch.length) return Promise.resolve();
      return Promise.all(batch.map(function (u) {
        return fetch(u, { headers: headers }).then(function (r) {
          if (!r.ok) throw new Error('API error ' + r.status);
          return r.json();
        }).then(function (d) { return (d.results || []).map(normalizeSchoolResult); });
      })).then(function (chunks) {
        for (var i = 0; i < chunks.length; i++) all = all.concat(chunks[i]);
        return runBatch(startIdx + CONCURRENCY);
      });
    }

    runBatch(0).then(function () {
      var seen = {};
      schoolResults = all.filter(function (r) {
        var id = r.id || schoolKeyOf(r);
        if (seen[id]) return false;
        seen[id] = true;
        return true;
      });
      schoolSearchBusy = false;
      var firstSearch = !state.flags.school_search;
      if (firstSearch && schoolResults.length) {
        state.flags.school_search = true;
        saveState();
        recompute('First school search done. Real schools, real data.');
      }
      renderSchools(recompute(null, { silent: true }));
    }).catch(function (e) {
      schoolSearchBusy = false;
      schoolResults = null;
      schoolSearchError = 'Search failed: ' + (e && e.message ? e.message : 'network error') + '. Check the connection and try again.';
      renderSchools(recompute(null, { silent: true }));
    });
  }

  /* ============================================================
     ACHIEVEMENTS
     ============================================================ */

  function renderAchievements(data) {
    var li = data.levelInfo;
    var span = li.next ? (li.next.min - li.level.min) : 1;
    var into = li.next ? (data.xp - li.level.min) : span;
    var pct = Math.max(0, Math.min(100, Math.round((into / span) * 100)));
    var xpLabel = li.next
      ? (data.xp + ' XP \u00b7 ' + (li.next.min - data.xp) + ' to ' + li.next.name)
      : (data.xp + ' XP \u00b7 top level reached');

    var ringsHtml = '';
    for (var i = 0; i < data.rings.length; i++) {
      var r = data.rings[i];
      ringsHtml += '<div class="cp-ring-cell">' + ringSvg(r.pct) + '<div class="cp-ring-name">' + escapeHtml(r.name) + '</div><div class="cp-ring-hint">' + escapeHtml(r.hint) + '</div></div>';
    }

    var w = data.working;
    var html = '';
    for (i = 0; i < MILESTONES.length; i++) {
      var m = MILESTONES[i];
      var earned = !m.soon && (state.earnedBadges.indexOf(m.id) !== -1 || m.test(w, data.xp));
      var cls = m.soon ? 'cp-locked cp-soon' : (earned ? 'cp-earned' : 'cp-locked');
      var detail = (earned && m.detail) ? m.detail(w) : null;
      var prog = (!earned && !m.soon && m.progress) ? m.progress(w) : null;
      html += '<div class="cp-trophy ' + cls + '">' +
        '<div class="cp-badge-medal">' + icon(earned || m.soon ? m.icon : 'lock') + '</div>' +
        '<div class="cp-trophy-name">' + escapeHtml(m.title) + '</div>' +
        '<div class="cp-trophy-cond">' + escapeHtml(detail || m.desc) + '</div>' +
        (m.soon
          ? '<span class="cp-trophy-earned-tag" style="background:#eef0f2;color:var(--cp-muted)">Coming soon</span>'
          : (earned
              ? '<span class="cp-trophy-earned-tag">Reached, +' + m.xp + ' XP</span>'
              : '<span class="cp-trophy-earned-tag" style="background:#eef0f2;color:var(--cp-muted)">' + escapeHtml(prog ? prog + ', worth ' + m.xp + ' XP' : 'Worth ' + m.xp + ' XP') + '</span>')) +
      '</div>';
    }

    el('cp-screen-achievements').innerHTML =
      '<div class="cp-eyebrow">Achievements</div>' +
      '<h2 class="cp-section-title">Your progress</h2>' +
      '<p class="cp-section-sub">A record of the real steps you have taken, not points for clicking around.</p>' +
      '<div class="cp-stack">' +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">Know Yourself</div>' +
          '<h3 class="cp-section-title" style="font-size:19px">How well do you know yourself?</h3>' +
          '<p class="cp-section-sub">These grow as you reflect, explore, and commit to favorites. They measure you against your own goals, nobody else\u2019s.</p>' +
          '<div class="cp-rings-row">' + ringsHtml + '</div>' +
        '</div>' +
        '<div class="cp-card">' +
          '<div class="cp-level-row"><span class="cp-level-chip cp-level-chip-light">' + icon('trophy') + escapeHtml(li.level.name) + '</span><span class="cp-item-meta">' + escapeHtml(xpLabel) + '</span></div>' +
          '<div class="cp-xp-track cp-xp-track-light"><div class="cp-xp-fill" style="width:' + pct + '%"></div></div>' +
          '<p class="cp-section-sub" style="margin-top:10px;margin-bottom:0">Every point of XP comes from a milestone below. Nothing here is earned by clicking around.</p>' +
        '</div>' +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">Milestones</div>' +
          '<h3 class="cp-section-title" style="font-size:19px">What you have actually done</h3>' +
          '<p class="cp-section-sub">Each one is a real step in figuring out what comes next.</p>' +
          '<div class="cp-trophy-grid">' + html + '</div>' +
        '</div>' +
      '</div>';
  }

  /* ============================================================
     RENDER ALL + BOOT
     ============================================================ */

  function renderAll() {
    if (!SESSION) return; // still booting
    var data = recompute(null, { silent: true });
    if (currentScreen === 'home') renderHome(data);
    if (currentScreen === 'whoiam') renderWhoIAm(data);
    if (currentScreen === 'majors') renderMajors(data);
    if (currentScreen === 'schools') renderSchools(data);
    if (currentScreen === 'achievements') renderAchievements(data);
  }

  // Nav + reset wiring (bound once).
  bind('.cp-nav-btn', function (btn) { showScreen(btn.getAttribute('data-screen')); });
  el('cp-reset-demo').addEventListener('click', function () {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
    window.location.reload();
  });

  // Iframe auto-height reporting for the Webflow embed.
  var dashRoot = document.getElementById('cp-hs-dash');
  function postHeight() {
    var h = Math.ceil(dashRoot.getBoundingClientRect().height);
    try {
      window.parent.postMessage({ type: 'CP_HS_DASH_RESIZE', height: h }, '*');
    } catch (e) { /* not embedded */ }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(postHeight).observe(dashRoot);
  } else {
    window.addEventListener('resize', postHeight);
  }
  postHeight();

  // Boot: load content (live Edge Functions, embedded fallback) and the
  // student's session (module localStorage -> tracker when LIVE -> mock).
  el('cp-screen-home').innerHTML = '<div class="cp-card cp-boot-loading"><div class="cp-spinner" aria-hidden="true"></div><p>Loading your path...</p></div>';

  function resolveSession() {
    var moduleState = readModuleState();
    if (moduleState) {
      SESSION_SOURCE = 'module';
      SESSION = normalizeSession(moduleState, {});
      if (LIVE && SESSION.email) {
        // Enrich with the tracked hs_sessions row once the tracker
        // supports 'get'; keeps local results if it fails.
        return trackerGet(SESSION.email).then(function (row) {
          if (row && row.surfaced_clusters) {
            SESSION_SOURCE = 'tracker';
            SESSION = normalizeSession({
              userEmail: row.student_email || SESSION.email,
              p1Answers: row.p1_answers || moduleState.p1Answers,
              selectedDomains: moduleState.selectedDomains,
              p2Answers: row.p2_answers || moduleState.p2Answers,
              surfacedClusters: row.surfaced_clusters,
              clusterMeta: moduleState.clusterMeta
            }, row);
          }
        });
      }
      return Promise.resolve();
    }
    SESSION_SOURCE = 'mock';
    SESSION = normalizeSession(MOCK_MODULE_STATE, MOCK_SESSION_ACTIVITY);
    return Promise.resolve();
  }

  Promise.all([loadContent(), resolveSession()]).then(function () {
    importModuleFavorites();
    // Seed the ledger and badges silently from historical activity so
    // nothing that already happened re-toasts.
    recompute(null, { silent: true });
    isFirstBoot = false;
    renderAll();
  });
})();
</script>
