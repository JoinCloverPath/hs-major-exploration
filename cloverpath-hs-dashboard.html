<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloverPath Student Dashboard</title>
<style>
/* ============================================================
   CloverPath HS Dashboard
   All styles scoped under #cp-hs-dash so nothing leaks into a
   host Webflow page when embedded via iframe.
   ============================================================ */

#cp-hs-dash {
  --cp-green: #008208;
  --cp-lime: #7BBC00;
  --cp-cream: #f5f6f7;
  --cp-forest: #0F3D1E;
  --cp-ink: #16211A;
  --cp-border: #e2e5e8;
  --cp-card: #ffffff;
  --cp-muted: #5b656c;
  --cp-soft-green: #e9f4e6;
  --cp-soft-lime: #f2f8e2;
  --cp-radius: 10px;
  --cp-radius-sm: 8px;
  --cp-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
  --cp-shadow-lift: 0 1px 3px rgba(16, 24, 40, 0.10);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--cp-ink);
  background: var(--cp-cream);
  line-height: 1.55;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

#cp-hs-dash *, #cp-hs-dash *::before, #cp-hs-dash *::after { box-sizing: border-box; }
#cp-hs-dash h1, #cp-hs-dash h2, #cp-hs-dash h3, #cp-hs-dash h4, #cp-hs-dash p { margin: 0; }
#cp-hs-dash button { font-family: inherit; cursor: pointer; }
#cp-hs-dash textarea { font-family: inherit; }
#cp-hs-dash svg { display: block; }

#cp-hs-dash .cp-serif { font-weight: 700; letter-spacing: -0.01em; }

#cp-hs-dash .cp-shell {
  max-width: 1080px;
  margin: 0 auto;
  padding: 24px 20px 48px;
}

/* ---------- Header ---------- */
#cp-hs-dash .cp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
#cp-hs-dash .cp-wordmark {
  display: flex; align-items: center; gap: 10px;
}
#cp-hs-dash .cp-wordmark-name {
  font-weight: 700; letter-spacing: -0.01em;
  font-size: 24px;
  color: var(--cp-forest);
  letter-spacing: 0.2px;
}
#cp-hs-dash .cp-wordmark-tag {
  font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--cp-green);
  background: var(--cp-soft-green);
  padding: 3px 9px;
  border-radius: 999px;
}
#cp-hs-dash .cp-header-right { display: flex; align-items: center; gap: 10px; }
#cp-hs-dash .cp-reset-btn {
  background: transparent;
  border: 1px solid var(--cp-border);
  border-radius: 8px;
  color: var(--cp-muted);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  transition: border-color 0.15s ease, color 0.15s ease;
}
#cp-hs-dash .cp-reset-btn:hover { border-color: var(--cp-muted); color: var(--cp-ink); }

/* ---------- Nav tabs ---------- */
#cp-hs-dash .cp-nav {
  display: flex;
  gap: 6px;
  background: #eceef1;
  border: 1px solid var(--cp-border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 26px;
  overflow-x: auto;
  scrollbar-width: none;
}
#cp-hs-dash .cp-nav::-webkit-scrollbar { display: none; }
#cp-hs-dash .cp-nav-btn {
  flex: 1;
  white-space: nowrap;
  border: none;
  background: transparent;
  color: var(--cp-muted);
  font-size: 14.5px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 7px;
  transition: background 0.18s ease, color 0.18s ease;
}
#cp-hs-dash .cp-nav-btn:hover { color: var(--cp-forest); }
#cp-hs-dash .cp-nav-btn.cp-active {
  background: var(--cp-forest);
  color: #fff;
}
#cp-hs-dash .cp-nav-btn:focus-visible,
#cp-hs-dash button:focus-visible,
#cp-hs-dash textarea:focus-visible,
#cp-hs-dash [tabindex]:focus-visible {
  outline: 2px solid var(--cp-green);
  outline-offset: 2px;
}

/* ---------- Cards and layout primitives ---------- */
#cp-hs-dash .cp-card {
  background: var(--cp-card);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius);
  box-shadow: var(--cp-shadow);
  padding: 22px;
}
#cp-hs-dash .cp-grid { display: grid; gap: 16px; }
#cp-hs-dash .cp-grid-2 { grid-template-columns: 1fr 1fr; }
#cp-hs-dash .cp-grid-3 { grid-template-columns: repeat(3, 1fr); }
#cp-hs-dash .cp-section-title {
  font-weight: 700; letter-spacing: -0.01em;
  font-size: 22px;
  color: var(--cp-forest);
  margin-bottom: 4px;
}
#cp-hs-dash .cp-section-sub { font-size: 14px; color: var(--cp-muted); margin-bottom: 14px; }
#cp-hs-dash .cp-eyebrow {
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--cp-green); margin-bottom: 6px;
}

/* ---------- Home hero ---------- */
#cp-hs-dash .cp-hero {
  background: var(--cp-forest);
  border-radius: 10px;
  color: #f4f8f2;
  padding: 30px 28px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
#cp-hs-dash .cp-hero h1 {
  font-weight: 700; letter-spacing: -0.01em;
  font-size: clamp(26px, 4vw, 34px);
  line-height: 1.15;
  margin-bottom: 6px;
}
#cp-hs-dash .cp-hero p { color: #cfe3cd; font-size: 15.5px; max-width: 540px; }
#cp-hs-dash .cp-hero-top { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; align-items: flex-start; }

#cp-hs-dash .cp-level-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(247, 245, 240, 0.12);
  border: 1px solid rgba(247, 245, 240, 0.25);
  border-radius: 999px;
  padding: 7px 14px;
  font-weight: 600; font-size: 14px;
  color: #fff;
  backdrop-filter: blur(2px);
}
#cp-hs-dash .cp-level-chip svg { width: 16px; height: 16px; }

#cp-hs-dash .cp-xp-wrap { margin-top: 20px; max-width: 560px; }
#cp-hs-dash .cp-xp-labels {
  display: flex; justify-content: space-between;
  font-size: 13px; font-weight: 600; color: #d8e8d4; margin-bottom: 7px;
}
#cp-hs-dash .cp-xp-track {
  height: 12px; border-radius: 999px;
  background: rgba(247, 245, 240, 0.18);
  overflow: hidden;
}
#cp-hs-dash .cp-xp-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--cp-lime);
  width: 0%;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
#cp-hs-dash .cp-hero-cta {
  margin-top: 22px;
  display: inline-flex; align-items: center; gap: 10px;
  background: #ffffff;
  color: var(--cp-forest);
  font-weight: 600; font-size: 15px;
  border: none; border-radius: 8px;
  padding: 12px 22px;
  text-decoration: none;
  transition: background 0.15s ease;
}
#cp-hs-dash .cp-hero-cta:hover { background: #eef1ee; }
#cp-hs-dash .cp-hero-cta svg { width: 17px; height: 17px; }

/* ---------- Know Yourself rings ---------- */
#cp-hs-dash .cp-rings-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
#cp-hs-dash .cp-ring-cell { text-align: center; padding: 6px 2px; }
#cp-hs-dash .cp-ring-svg { margin: 0 auto 8px; }
#cp-hs-dash .cp-ring-track { stroke: #edeae0; }
#cp-hs-dash .cp-ring-fill {
  stroke: var(--cp-green);
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}
#cp-hs-dash .cp-ring-pct {
  font-family: inherit;
  font-weight: 700; font-size: 15px; fill: var(--cp-forest);
}
#cp-hs-dash .cp-ring-name { font-size: 13px; font-weight: 600; color: var(--cp-ink); }
#cp-hs-dash .cp-ring-hint { font-size: 11.5px; color: var(--cp-muted); margin-top: 1px; }

/* ---------- Nudge ---------- */
#cp-hs-dash .cp-nudge {
  display: flex; align-items: center; gap: 14px;
  background: var(--cp-soft-lime);
  border: 1px solid #d9e8b4;
  border-radius: var(--cp-radius);
  padding: 15px 18px;
}
#cp-hs-dash .cp-nudge-icon {
  flex: none; width: 38px; height: 38px; border-radius: 10px;
  background: var(--cp-lime); color: var(--cp-forest);
  display: flex; align-items: center; justify-content: center;
}
#cp-hs-dash .cp-nudge-icon svg { width: 20px; height: 20px; }
#cp-hs-dash .cp-nudge-text { flex: 1; font-size: 14.5px; }
#cp-hs-dash .cp-nudge-text strong { color: var(--cp-forest); }
#cp-hs-dash .cp-nudge-btn {
  flex: none;
  background: var(--cp-forest); color: #fff;
  border: none; border-radius: 999px;
  font-weight: 600; font-size: 13.5px;
  padding: 8px 16px;
  transition: background 0.15s ease;
}
#cp-hs-dash .cp-nudge-btn:hover { background: #16522a; }

/* ---------- Badges ---------- */
#cp-hs-dash .cp-badge-strip { display: flex; gap: 12px; flex-wrap: wrap; }
#cp-hs-dash .cp-badge {
  display: flex; align-items: center; gap: 10px;
  background: var(--cp-card);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius-sm);
  padding: 10px 14px;
}
#cp-hs-dash .cp-badge-medal {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--cp-green);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex: none;
}
#cp-hs-dash .cp-badge-medal svg { width: 20px; height: 20px; }
#cp-hs-dash .cp-badge-name { font-weight: 700; font-size: 14px; color: var(--cp-forest); }
#cp-hs-dash .cp-badge-desc { font-size: 12px; color: var(--cp-muted); }

#cp-hs-dash .cp-trophy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
#cp-hs-dash .cp-trophy {
  background: var(--cp-card);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius);
  padding: 20px 18px;
  text-align: center;
  transition: box-shadow 0.15s ease;
}
#cp-hs-dash .cp-trophy.cp-earned:hover { box-shadow: var(--cp-shadow-lift); }
#cp-hs-dash .cp-trophy .cp-badge-medal { width: 56px; height: 56px; margin: 0 auto 12px; }
#cp-hs-dash .cp-trophy .cp-badge-medal svg { width: 27px; height: 27px; }
#cp-hs-dash .cp-trophy.cp-locked { opacity: 0.72; }
#cp-hs-dash .cp-trophy.cp-locked .cp-badge-medal {
  background: #dcd9cf; color: #97948b;
}
#cp-hs-dash .cp-trophy-name { font-weight: 700; letter-spacing: -0.01em; font-size: 18px; color: var(--cp-forest); margin-bottom: 3px; }
#cp-hs-dash .cp-trophy.cp-locked .cp-trophy-name { color: #7c8078; }
#cp-hs-dash .cp-trophy-cond { font-size: 12.5px; color: var(--cp-muted); }
#cp-hs-dash .cp-trophy-earned-tag {
  display: inline-block; margin-top: 10px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--cp-green); background: var(--cp-soft-green);
  border-radius: 999px; padding: 3px 10px;
}

/* ---------- Explore ---------- */
#cp-hs-dash .cp-subtabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
#cp-hs-dash .cp-subtab {
  border: 1px solid var(--cp-border);
  background: var(--cp-card);
  color: var(--cp-muted);
  border-radius: 999px;
  font-weight: 600; font-size: 14px;
  padding: 8px 18px;
  transition: all 0.15s ease;
}
#cp-hs-dash .cp-subtab.cp-active {
  background: var(--cp-green); border-color: var(--cp-green); color: #fff;
}
#cp-hs-dash .cp-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
#cp-hs-dash .cp-chip {
  border: 1px solid var(--cp-border);
  background: transparent;
  color: var(--cp-muted);
  border-radius: 999px;
  font-weight: 500; font-size: 12.5px;
  padding: 5px 12px;
  transition: all 0.15s ease;
}
#cp-hs-dash .cp-chip.cp-active { background: var(--cp-forest); border-color: var(--cp-forest); color: #fff; }
#cp-hs-dash .cp-chip:hover:not(.cp-active) { border-color: var(--cp-green); color: var(--cp-green); }

#cp-hs-dash .cp-item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
#cp-hs-dash .cp-item-card {
  background: var(--cp-card);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius);
  padding: 18px;
  text-align: left;
  transition: box-shadow 0.15s ease, border-color 0.15s ease;
  display: flex; flex-direction: column; gap: 8px;
  position: relative;
}
#cp-hs-dash .cp-item-card:hover { box-shadow: var(--cp-shadow-lift); border-color: #c6cdd3; }
#cp-hs-dash .cp-item-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--cp-soft-green); color: var(--cp-green);
  display: flex; align-items: center; justify-content: center;
}
#cp-hs-dash .cp-item-icon svg { width: 21px; height: 21px; }
#cp-hs-dash .cp-item-name { font-weight: 700; font-size: 15.5px; color: var(--cp-forest); }
#cp-hs-dash .cp-item-blurb { font-size: 13px; color: var(--cp-muted); }
#cp-hs-dash .cp-item-meta { font-size: 12px; color: var(--cp-muted); }
#cp-hs-dash .cp-state-tags { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
#cp-hs-dash .cp-state-tag {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  border-radius: 999px; padding: 2.5px 8px;
}
#cp-hs-dash .cp-tag-viewed { background: #f0eee6; color: #8b8878; }
#cp-hs-dash .cp-tag-saved { background: var(--cp-soft-green); color: var(--cp-green); }

/* ---------- Detail modal ---------- */
#cp-hs-dash .cp-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(22, 33, 26, 0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  z-index: 9000;
  animation: cpFadeIn 0.18s ease;
}
#cp-hs-dash .cp-modal {
  background: var(--cp-cream);
  border-radius: 10px;
  max-width: 640px; width: 100%;
  max-height: 86vh; overflow-y: auto;
  padding: 28px;
  box-shadow: 0 12px 32px rgba(16, 24, 40, 0.18);
  animation: cpSlideUp 0.22s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes cpFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes cpSlideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
#cp-hs-dash .cp-modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 8px; }
#cp-hs-dash .cp-modal-title { font-weight: 700; letter-spacing: -0.01em; font-size: 26px; color: var(--cp-forest); line-height: 1.15; }
#cp-hs-dash .cp-modal-close {
  flex: none; border: 1px solid var(--cp-border); background: var(--cp-card);
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--cp-muted);
}
#cp-hs-dash .cp-modal-close:hover { color: var(--cp-ink); border-color: var(--cp-muted); }
#cp-hs-dash .cp-modal-close svg { width: 15px; height: 15px; }
#cp-hs-dash .cp-modal-sub { color: var(--cp-muted); font-size: 14px; margin-bottom: 16px; }
#cp-hs-dash .cp-detail-block { background: var(--cp-card); border: 1px solid var(--cp-border); border-radius: var(--cp-radius-sm); padding: 14px 16px; margin-bottom: 12px; }
#cp-hs-dash .cp-detail-block h4 { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cp-green); margin-bottom: 5px; }
#cp-hs-dash .cp-detail-block p, #cp-hs-dash .cp-detail-block li { font-size: 14px; color: var(--cp-ink); }
#cp-hs-dash .cp-detail-block ul { margin: 0; padding-left: 18px; }
#cp-hs-dash .cp-illustrative-note { font-size: 11.5px; color: var(--cp-muted); font-style: italic; margin-top: 8px; }

#cp-hs-dash .cp-action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
#cp-hs-dash .cp-action-btn {
  display: inline-flex; align-items: center; gap: 8px;
  border-radius: 8px;
  font-weight: 700; font-size: 14px;
  padding: 10px 20px;
  border: none;
  transition: all 0.15s ease;
}
#cp-hs-dash .cp-action-btn svg { width: 16px; height: 16px; }
#cp-hs-dash .cp-btn-save { background: var(--cp-green); color: #fff; }
#cp-hs-dash .cp-btn-save:hover { background: #069b10; }
#cp-hs-dash .cp-btn-save:disabled { background: var(--cp-soft-green); color: var(--cp-green); cursor: default; }
#cp-hs-dash .cp-btn-reflect { background: var(--cp-forest); color: #fff; }
#cp-hs-dash .cp-btn-reflect:hover { background: #16522a; }
#cp-hs-dash .cp-btn-compare { background: transparent; color: var(--cp-forest); border: 1.5px solid var(--cp-forest); }
#cp-hs-dash .cp-btn-compare:hover { background: var(--cp-forest); color: #fff; }
#cp-hs-dash .cp-btn-compare.cp-in-tray { background: var(--cp-soft-green); border-color: var(--cp-green); color: var(--cp-forest); }

#cp-hs-dash .cp-xp-hint { font-size: 11.5px; color: var(--cp-muted); margin-top: 8px; }

/* ---------- Reflection form ---------- */
#cp-hs-dash .cp-reflect-form { margin-top: 16px; background: var(--cp-card); border: 1px solid var(--cp-border); border-radius: var(--cp-radius-sm); padding: 16px; }
#cp-hs-dash .cp-reflect-form label { font-weight: 600; font-size: 14px; color: var(--cp-forest); display: block; margin-bottom: 8px; }
#cp-hs-dash .cp-reflect-form textarea {
  width: 100%; min-height: 90px; resize: vertical;
  border: 1px solid var(--cp-border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; color: var(--cp-ink);
  background: var(--cp-cream);
}
#cp-hs-dash .cp-reflect-form textarea:focus { outline: 2px solid var(--cp-green); border-color: var(--cp-green); }
#cp-hs-dash .cp-reflect-saved { background: var(--cp-soft-green); border: 1px solid #cbe4c4; border-radius: var(--cp-radius-sm); padding: 13px 15px; margin-top: 16px; font-size: 14px; }
#cp-hs-dash .cp-reflect-saved strong { color: var(--cp-green); display: block; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }

/* ---------- Compare ---------- */
#cp-hs-dash .cp-compare-tray {
  position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
  background: var(--cp-forest); color: #fff;
  border-radius: 10px;
  padding: 11px 20px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 6px 20px rgba(16, 24, 40, 0.22);
  z-index: 8500;
  font-size: 14px; font-weight: 600;
  max-width: calc(100vw - 30px);
}
#cp-hs-dash .cp-compare-tray button {
  background: rgba(255,255,255,0.14); border: none; color: #fff;
  border-radius: 999px; padding: 5px 13px; font-size: 12.5px; font-weight: 600;
}
#cp-hs-dash .cp-compare-tray button:hover { background: rgba(255,255,255,0.24); }
#cp-hs-dash .cp-compare-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
#cp-hs-dash .cp-compare-col { background: var(--cp-card); border: 1px solid var(--cp-border); border-radius: var(--cp-radius-sm); padding: 16px; }
#cp-hs-dash .cp-compare-col h3 { font-weight: 700; letter-spacing: -0.01em; font-size: 19px; color: var(--cp-forest); margin-bottom: 8px; }
#cp-hs-dash .cp-compare-field { margin-bottom: 10px; }
#cp-hs-dash .cp-compare-field h5 { margin: 0 0 2px; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--cp-green); }
#cp-hs-dash .cp-compare-field p { font-size: 13px; }

/* ---------- Results chart ---------- */
#cp-hs-dash .cp-chart-wrap { overflow-x: auto; }
#cp-hs-dash .cp-bar-label { font-size: 12.5px; font-weight: 600; fill: var(--cp-ink); font-family: inherit; }
#cp-hs-dash .cp-bar-value { font-size: 12px; font-weight: 700; fill: var(--cp-forest); font-family: inherit; }
#cp-hs-dash .cp-bar-track { fill: #edeae0; }
#cp-hs-dash .cp-bar-fill { fill: var(--cp-green); }
#cp-hs-dash .cp-bar-fill.cp-bar-top { fill: var(--cp-lime); }

#cp-hs-dash .cp-locked-state { text-align: center; padding: 46px 24px; }
#cp-hs-dash .cp-locked-state .cp-item-icon { margin: 0 auto 14px; width: 52px; height: 52px; }
#cp-hs-dash .cp-locked-state .cp-item-icon svg { width: 26px; height: 26px; }

/* ---------- My Path ---------- */
#cp-hs-dash .cp-empty {
  border: 1.5px dashed #d5d1c4;
  border-radius: var(--cp-radius);
  padding: 26px 20px;
  text-align: center;
  color: var(--cp-muted);
  font-size: 14px;
}
#cp-hs-dash .cp-empty button {
  margin-top: 10px;
  background: var(--cp-green); color: #fff; border: none;
  border-radius: 999px; padding: 8px 18px; font-weight: 600; font-size: 13.5px;
}

<script>
(function () {

  // Re-entry guard: safe if the host page injects this file twice.
  if (window.__cpHsDashInitialized) return;
  window.__cpHsDashInitialized = true;

     CONFIG

  // Same Supabase project + Edge Functions the aptitude module uses.
  // The anon key is public by design.
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsaHVwbGhhZWpuZWVjYnlocGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA2Mzc5OTksImV4cCI6MjA3NjIxMzk5OX0.ropRR6Izmcy1sRV5v9HDDvBTlCTTGnJcLUvdSyYloBI';
  var HS_CONTENT_URLS = [
    'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-content',
    'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-content-2',
    'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-content-3'
  ];
  var SCORECARD_URL = 'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/college-scorecard';
  var HS_TRACKER_URL = 'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-session-tracker';
  var AUTH_HEADERS = { 'Authorization': 'Bearer ' + SUPABASE_ANON, 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' };

  // LIVE controls backend session sync only (content + Scorecard always
  // try the network). When the tracker Edge Function gains a 'get'
  // action, flip this on: the dashboard will fetch the hs_sessions row
  // by email and append dashboard activity to the same row.
  var LIVE = false;
  var _sessionId = null;

  function trackerGet(email) {
    // Seam for the future 'get' action on hs-session-tracker.
    if (!LIVE) return Promise.resolve(null);
    return fetch(HS_TRACKER_URL, {
      method: 'POST', headers: AUTH_HEADERS,
      body: JSON.stringify({ action: 'get', email: email })
    }).then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d && d.session_id) _sessionId = d.session_id; return d; })
      .catch(function () { return null; });
  }

  function trackAppend(col, val) {
    // Write-through of dashboard activity to the same hs_sessions row.
    // No-op until LIVE is on and a session id has been resolved.
    if (!LIVE || !_sessionId) return;
    try {
      fetch(HS_TRACKER_URL, {
        method: 'POST', headers: AUTH_HEADERS,
        body: JSON.stringify({ action: 'append', session_id: _sessionId, col: col, val: val })
      }).catch(function () { /* fire and forget */ });
    } catch (e) { /* ignore */ }
  }

  function fetchWithRetry(url, options, retries) {
    retries = retries || 3;
    return new Promise(function (resolve, reject) {
      var attempt = 0;
      function go() {
        attempt++;
        fetch(url, options).then(function (res) {
          if (res.ok) return resolve(res);
          if (attempt < retries) setTimeout(go, 800); else reject(new Error('HTTP ' + res.status));

  /* ============================================================
     CONTENT (clusters, majors, careers) — loaded from the same

     ============================================================ */

  var CONTENT_LIVE = false; // true once Edge Function content loads
  var clusters = [];        // [{id,title,about,enjoy,color,majors[],workOn[],learningFeels[]}]
  var majorCatalog = {};    // title -> {title,clusterId,whatItIs,whatYouStudy[],whatProjectsFeelLike[],goodToKnow[],careerExamples[],tryItInHS[]}
  var CAREER_ABSTRACTS = {}; // lookup_key -> {title, sections:[{h,p,bullets}]}

  function shapeContent(data) {
    clusters = (data.clusters || []).map(function (c) {
      var items = (data.clusterItems || []).filter(function (i) { return i.cluster_id === c.id; });
      return {
        id: c.id,
        title: c.title,
        about: c.about,
        enjoy: c.enjoy,
        color: c.color,
        majors: (data.majors || []).filter(function (m) { return m.cluster_id === c.id; }).map(function (m) { return m.title; }),
        workOn: items.filter(function (i) { return i.type === 'work_on'; }).sort(function (a, b) { return a.display_order - b.display_order; }).map(function (i) { return i.content; }),
        learningFeels: items.filter(function (i) { return i.type === 'learning_feel'; }).sort(function (a, b) { return a.display_order - b.display_order; }).map(function (i) { return i.content; })
      };
    });
    majorCatalog = {};
    (data.majors || []).forEach(function (m) {
      var items = (data.majorItems || []).filter(function (i) { return i.major_id === m.id; });
      function getItems(type) {
        return items.filter(function (i) { return i.type === type; }).sort(function (a, b) { return a.display_order - b.display_order; }).map(function (i) { return i.content; });
      }
      majorCatalog[m.title] = {
        title: m.title,
        clusterId: m.cluster_id,
        whatItIs: m.what_it_is,
        whatYouStudy: getItems('what_you_study'),
        whatProjectsFeelLike: getItems('what_projects_feel'),
        goodToKnow: getItems('good_to_know'),
        careerExamples: getItems('career_example'),
        tryItInHS: getItems('try_it_in_hs')
      };
    });
    CAREER_ABSTRACTS = {};
    (data.careers || []).forEach(function (c) {
      var sections = (data.careerSections || []).filter(function (s) { return s.career_id === c.id; }).sort(function (a, b) { return a.display_order - b.display_order; });
      CAREER_ABSTRACTS[c.lookup_key] = {

        if (fieldsWithMajorOpened(w).length >= depthTarget(w)) return null;
        var opened = {};
        var f = fieldsWithMajorOpened(w);
        for (var i = 0; i < f.length; i++) opened[f[i]] = true;
        var left = w.surfaced.filter(function (id) { return !opened[id]; });
        return left.length ? ('No majors opened yet in: ' + nameList(left, clusterTitle, 3)) : null;
      }
    },
    {
      id: 'careers', stage: 'explore', icon: 'briefcase', xp: 50,
      title: 'Meet the careers behind them',
      desc: 'Open two career spotlights inside majors that interest you.',
      go: 'majors',
      test: function (w) { return w.careers_viewed.length >= 2; },
      progress: function (w) { return Math.min(2, w.careers_viewed.length) + ' of 2'; }
    },
    {
      id: 'compare', stage: 'narrow', icon: 'scale', xp: 50,
      title: 'Put two fields head to head',
      desc: 'Compare two career fields side by side and see what you actually care about.',
      go: 'majors',
      test: function (w) { return w.comparisons_made.length >= 1; },
      detail: function (w) {
        if (!w.comparisons_made.length) return null;
        var parts = String(w.comparisons_made[w.comparisons_made.length - 1]).split(' vs ');
        return 'Compared ' + clusterTitle(parts[0]) + ' with ' + clusterTitle(parts[1]);
      }
    },
    {
      id: 'reflection', stage: 'narrow', icon: 'pencil', xp: 75,
      title: 'Write a reflection in your own words',
      desc: 'Open a major or field and write a few honest sentences about the fit.',
      go: 'majors',
      test: function () { return Object.keys(state.reflections).length >= 1; },
      detail: function () {
        var n = Object.keys(state.reflections).length;
        return n ? (n + (n === 1 ? ' reflection written' : ' reflections written')) : null;
      }
    },
    {
      id: 'major_shortlist', stage: 'narrow', icon: 'bookmark', xp: 75,
      title: 'Build your major shortlist',
      desc: 'Save the two majors that feel most like you.',
      go: 'majors',
      test: function (w) { return w.majors_saved.length >= 2; },
      progress: function (w) { return Math.min(2, w.majors_saved.length) + ' of 2'; },
      detail: function (w) {
        return w.majors_saved.length ? ('Shortlist: ' + nameList(w.majors_saved, function (x) { return x; }, 4)) : null;
      }
    },
    {
      id: 'school_search', stage: 'schools', icon: 'map', xp: 50,
      title: 'Search real schools',
      desc: 'Run a real search for schools that teach one of your majors.',
      go: 'schools',
      test: function () { return !!state.flags.school_search; }
    },
    {
      id: 'school_shortlist', stage: 'schools', icon: 'star', xp: 75,
      title: 'Build your school shortlist',
      desc: 'Save three schools worth a real look.',
      go: 'schools',
      test: function (w) { return w.schools_saved.length >= 3; },
      progress: function (w) { return Math.min(3, w.schools_saved.length) + ' of 3'; },
      detail: function (w) {
        return w.schools_saved.length ? ('Saved: ' + nameList(w.schools_saved, function (s) { return s.name; }, 3)) : null;
      }
    },
    {
      id: 'day_in_life', stage: 'work', icon: 'play', xp: 0, soon: true,
      title: 'Watch a day in the life',
      desc: 'Short videos of real people doing the careers on your list. See the work before you choose it.',
      go: null,
      test: function () { return false; }
    }
  ];

  function milestonesForStage(stageId) {
    return MILESTONES.filter(function (m) { return m.stage === stageId; });
  }

  /* ============================================================
     PERSISTED DASHBOARD STATE (deltas + award ledger only)
     ============================================================ */

  function blankState() {
    return {
      ledger: [],
      earnedBadges: [],
      views: { majors: [], clusters: [], careers: [], schools: [] },
      saves: { majors: [], clusters: [], schools: [] }, // schools: [{key,name,city,state}]
      reflections: {},
      comparisons: [],  // 'a vs b' cluster strings, module format
      flags: {}         // whoiam_read, school_search, favorites_imported
    };
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var base = blankState();
      for (var k in base) if (parsed[k] !== undefined) base[k] = parsed[k];
      var vb = blankState().views;
      for (var vk in vb) if (!base.views[vk]) base.views[vk] = [];
      if (!base.flags) base.flags = {};
      if (!base.saves.schools) base.saves.schools = [];
      return base;
    } catch (e) { return null; }
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
  }

  var isFirstBoot = false;
  var state = loadState();
  if (!state) { state = blankState(); isFirstBoot = true; }

  // One-time import of favorites saved inside the aptitude module, so
  // nothing a student saved there gets lost.
  function importModuleFavorites() {
    if (state.flags.favorites_imported) return;
    var fav = readModuleFavorites();
    state.flags.favorites_imported = true;
    if (fav) {
      var i;
      for (i = 0; i < fav.clusters.length; i++) {
        if (state.saves.clusters.indexOf(fav.clusters[i]) === -1) state.saves.clusters.push(fav.clusters[i]);
      }
      for (i = 0; i < fav.majors.length; i++) {
        if (state.saves.majors.indexOf(fav.majors[i]) === -1) state.saves.majors.push(fav.majors[i]);
      }
      for (i = 0; i < fav.schools.length; i++) {
        var sc = fav.schools[i];
        if (!sc || !sc.name) continue;
        var key = sc.name + '_' + (sc.city || '') + '_' + (sc.state || '');
        var exists = state.saves.schools.some(function (x) { return x.key === key; });
        if (!exists) state.saves.schools.push({ key: key, name: sc.name, city: sc.city || '', state: sc.state || '' });
      }
    }
    saveState();
  }

  /* ============================================================
     WORKING COPY (session merged with dashboard deltas)
     ============================================================ */

  function uniq(arr) {
    var out = [], seen = {};
    for (var i = 0; i < arr.length; i++) {
      var v = arr[i];
      if (!seen[v]) { seen[v] = true; out.push(v); }
    }
    return out;
  }

  function schoolSavesAll() {
    // Session names (strings) + dashboard saves (objects) merged into
    // objects keyed for dedupe.
    var out = [], seen = {};
    var i;
    for (i = 0; i < state.saves.schools.length; i++) {
      var s = state.saves.schools[i];
      if (!seen[s.key]) { seen[s.key] = true; out.push(s); }
    }
    for (i = 0; i < SESSION.schools_saved_names.length; i++) {
      var name = SESSION.schools_saved_names[i];
      var hit = false;
      for (var k in seen) if (k.indexOf(name + '_') === 0) hit = true;
      if (!hit && !seen[name]) { seen[name] = true; out.push({ key: name, name: name, city: '', state: '' }); }
    }
    return out;
  }

  function getWorking() {
    return {
      completed: SESSION.completed,
      p1_completed: SESSION.p1_completed,
      p1Answers: SESSION.p1Answers,
      selectedDomains: SESSION.selectedDomains,
      p2Answers: SESSION.p2Answers,
      surfaced: SESSION.surfaced,
      clusterMeta: SESSION.clusterMeta,
      clusters_viewed: uniq(SESSION.clusters_viewed.concat(state.views.clusters)),
      majors_viewed: uniq(SESSION.majors_viewed.concat(state.views.majors)),
      careers_viewed: uniq(state.views.careers),
      schools_viewed: uniq(state.views.schools),
      majors_saved: uniq(SESSION.majors_saved.concat(state.saves.majors)),
      clusters_saved: uniq(SESSION.clusters_saved.concat(state.saves.clusters)),
      schools_saved: schoolSavesAll(),
      comparisons_made: uniq(SESSION.comparisons_made.concat(state.comparisons))
    };
  }

  /* ============================================================
     XP ENGINE (pure function of working copy; ledger keeps awards
     idempotent across reloads and re-renders)
     ============================================================ */

  function cmpKey(str) {
    var parts = String(str).split(' vs ').sort();
    return 'cmp:' + parts.join('|');
  }

  function collectXpItems(w) {
    // XP comes from milestones and nothing else. Opening pages or
    // clicking around earns nothing; finishing real steps does.
    var items = [];
    for (var i = 0; i < MILESTONES.length; i++) {
      var m = MILESTONES[i];
      if (m.soon || !m.xp) continue;
      if (m.test(w)) items.push({ key: 'ms:' + m.id, xp: m.xp });
    }
    return items;
  }

  function totalXp(items) {
    var t = 0;
    for (var i = 0; i < items.length; i++) t += items[i].xp;
    return t;
  }

  function levelFor(xp) {
    var lvl = LEVELS[0], next = null;
    for (var i = 0; i < LEVELS.length; i++) {
      if (xp >= LEVELS[i].min) { lvl = LEVELS[i]; next = LEVELS[i + 1] || null; }
    }
    return { level: lvl, next: next };
  }

  function reflectedClusterCount(w) {
    var reflected = {};
    // Assessment reflections credit the domain's base clusters.
    for (var domain in w.p2Answers) {
      if (w.p2Answers[domain] && w.p2Answers[domain].reflect) {
        var cids = domainBaseClusters[domain] || [];
        for (var j = 0; j < cids.length; j++) reflected[cids[j]] = true;
      }
    }
    // Native reflections credit their own cluster (or the major's cluster).
    for (var key in state.reflections) {
      var r = state.reflections[key];
      if (r.type === 'cluster') reflected[r.id] = true;
      if (r.type === 'major') {
        var m = majorCatalog[r.id];
        if (m && m.clusterId) reflected[m.clusterId] = true;
      }
    }
    var count = 0;
    for (var i = 0; i < w.surfaced.length; i++) {
      if (reflected[w.surfaced[i]]) count++;
    }
    return count;
  }

  function computeRings(w) {
    var answered = 0;
    for (var k in w.p1Answers) answered++;
    var interests = w.p1_completed ? 100 : Math.round((answered / 13) * 100);
    var reflection = w.surfaced.length ? Math.min(100, Math.round((reflectedClusterCount(w) / w.surfaced.length) * 100)) : 0;
    var clustPart = Math.min(1, uniq(w.clusters_viewed).length / 3);
    var majPart = Math.min(1, w.majors_viewed.length / 8);
    var exploration = Math.round(((clustPart + majPart) / 2) * 100);
    var saves = w.majors_saved.length + w.clusters_saved.length + w.schools_saved.length;
    var savePart = Math.min(1, saves / 6);
    var cmpPart = Math.min(1, w.comparisons_made.length / 2);
    var commitment = Math.round((savePart * 0.6 + cmpPart * 0.4) * 100);
    return [
      { name: 'Interests', pct: interests, hint: 'From your assessment' },
      { name: 'Reflection', pct: reflection, hint: 'Fields you have written about' },
      { name: 'Exploration', pct: exploration, hint: 'Fields and majors opened' },
      { name: 'Commitment', pct: commitment, hint: 'Saves and comparisons' }
    ];
  }

  /* ============================================================
     RECOMPUTE + AWARD LOOP
     ============================================================ */

  var lastXpTotal = 0;

  function recompute(actionLabel, opts) {
    opts = opts || {};
    var w = getWorking();
    var items = collectXpItems(w);
    var xp = totalXp(items);

    var ledgerSet = {};
    for (var i = 0; i < state.ledger.length; i++) ledgerSet[state.ledger[i]] = true;
    var newXp = 0;
    for (i = 0; i < items.length; i++) {
      if (!ledgerSet[items[i].key]) {
        newXp += items[i].xp;
        state.ledger.push(items[i].key);
      }
    }

    var prevLevel = levelFor(lastXpTotal).level.name;
    var lvlInfo = levelFor(xp);

    var earnedSet = {};
    for (i = 0; i < state.earnedBadges.length; i++) earnedSet[state.earnedBadges[i]] = true;
    var newBadges = [];
    for (i = 0; i < MILESTONES.length; i++) {
      if (MILESTONES[i].soon) continue;
      if (!earnedSet[MILESTONES[i].id] && MILESTONES[i].test(w, xp)) {
        state.earnedBadges.push(MILESTONES[i].id);
        newBadges.push(MILESTONES[i]);
      }
    }

    saveState();

    var announce = !isFirstBoot && !opts.silent;
    if (announce && newXp > 0) {
      toast('xp', '+' + newXp + ' XP', actionLabel || 'Nice work.');
    }
    if (announce && lastXpTotal > 0 && lvlInfo.level.name !== prevLevel && xp > lastXpTotal) {
      toast('level', lvlInfo.level.name, 'Level up. You are now a ' + lvlInfo.level.name + '.');
    }
    if (announce) {
      for (i = 0; i < newBadges.length; i++) {
        toast('badge', 'Milestone', 'Milestone reached: ' + newBadges[i].title + '.');
      }
    }

    lastXpTotal = xp;
    return { working: w, xp: xp, levelInfo: lvlInfo, rings: computeRings(w) };
  }

  /* ============================================================
     HELPERS
     ============================================================ */

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function el(id) { return document.getElementById(id); }
  function findCluster(id) { for (var i = 0; i < clusters.length; i++) if (clusters[i].id === id) return clusters[i]; return null; }
  function clusterTitle(id) { var c = findCluster(id); return c ? c.title : id; }
  function clusterColor(id) { var c = findCluster(id); return (c && c.color) || '#0F3D1E'; }
  function icon(name) { return ICONS[name] || ICONS.compass; }

  // Escape content, then make any career names clickable against the
  // loaded career abstracts (same behavior as the module, XSS-safe).
  function careerLinkify(text) {
    var safe = escapeHtml(text);
    var keys = Object.keys(CAREER_ABSTRACTS).sort(function (a, b) { return b.length - a.length; });
    for (var i = 0; i < keys.length; i++) {
      var kSafe = escapeHtml(keys[i]).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      safe = safe.replace(new RegExp(kSafe, 'gi'), function (match) {
        return '<button type="button" class="cp-career-link" data-career="' + escapeHtml(keys[i]) + '">' + match + '</button>';
      });
    }
    return safe;
  }

  function toast(kind, chip, msg) {
    var root = el('cp-toast-root');
    if (!root) return;
    var t = document.createElement('div');
    t.className = 'cp-toast' + (kind === 'level' ? ' cp-toast-level' : kind === 'badge' ? ' cp-toast-badge' : '');
    t.innerHTML = '<span class="cp-toast-xp">' + escapeHtml(chip) + '</span><span>' + escapeHtml(msg) + '</span>';
    root.appendChild(t);
    setTimeout(function () {
      t.classList.add('cp-toast-out');
      setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
    }, 3400);
  }

  function ringSvg(pct, size) {
    size = size || 92;
    var r = 36, c = 2 * Math.PI * r;
    var offset = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
    return '<svg class="cp-ring-svg" width="' + size + '" height="' + size + '" viewBox="0 0 92 92" role="img" aria-label="' + pct + ' percent">' +
      '<circle class="cp-ring-track" cx="46" cy="46" r="' + r + '" fill="none" stroke-width="9"/>' +
      '<circle class="cp-ring-fill" cx="46" cy="46" r="' + r + '" fill="none" stroke-width="9" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/>' +
      '<text class="cp-ring-pct" x="46" y="51" text-anchor="middle">' + pct + '%</text>' +
    '</svg>';
  }

  function bind(selector, fn) {
    var nodes = document.querySelectorAll('#cp-hs-dash ' + selector);
    for (var i = 0; i < nodes.length; i++) {
      (function (node) { node.addEventListener('click', function () { fn(node); }); })(nodes[i]);
    }
  }

  function bindCareerLinks(scopeSelector) {
    bind(scopeSelector + ' .cp-career-link', function (btn) {
      openCareerDrawer(btn.getAttribute('data-career'));
    });
  }

  /* ============================================================
     NAVIGATION
     ============================================================ */

  var currentScreen = 'home';
  var majorsPrefs = { cluster: 'all' };

  function showScreen(name, prefs) {
    currentScreen = name;
    if (prefs && prefs.cluster !== undefined) majorsPrefs.cluster = prefs.cluster;
    var btns = document.querySelectorAll('#cp-hs-dash .cp-nav-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('cp-active', btns[i].getAttribute('data-screen') === name);
    }
    var screens = document.querySelectorAll('#cp-hs-dash .cp-screen');
    for (i = 0; i < screens.length; i++) {
      screens[i].classList.toggle('cp-active', screens[i].id === 'cp-screen-' + name);
    }
    renderAll();
    if (!isFirstBoot) { try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch (e) { /* older browsers */ } }
  }

  /* ============================================================
     HOME (milestone checklist grouped by journey stage)
     ============================================================ */

  function milestoneStatusList(w, xp) {
    // Milestones in journey order, each annotated done/next/todo.
    // 'next' is the single first incomplete real milestone.
    var out = [];
    var nextFound = false;
    for (var i = 0; i < MILESTONES.length; i++) {
      var m = MILESTONES[i];
      var done = !m.soon && m.test(w, xp);
      var status = 'todo';
      if (m.soon) status = 'soon';
      else if (done) status = 'done';
      else if (!nextFound) { status = 'next'; nextFound = true; }
      out.push({ m: m, done: done, status: status });
    }
    return out;
  }

  function msRowHtml(entry, w) {
    var m = entry.m;
    var chip;
    if (entry.status === 'soon') chip = 'Coming soon';
    else if (entry.done) chip = 'Earned +' + m.xp + ' XP';
    else chip = '+' + m.xp + ' XP';
    var statusLabel = entry.status === 'next' ? 'Up next' : (entry.done ? 'Complete' : '');
    var prog = (!entry.done && m.progress) ? m.progress(w) : null;
    var detail = m.detail ? m.detail(w) : null;
    var tag = entry.status === 'soon' ? 'div' : 'button';
    var goAttr = entry.status === 'soon' ? '' : ' type="button" data-go="' + m.go + '"';
    return '<' + tag + ' class="cp-ms-row cp-ms-' + entry.status + '"' + goAttr +
      ' aria-label="' + escapeHtml(m.title + '. ' + (statusLabel || chip)) + '">' +
      '<span class="cp-ms-check" aria-hidden="true">' + (entry.done ? icon('check') : icon(m.icon)) + '</span>' +
      '<span class="cp-ms-body">' +
        '<span class="cp-ms-top">' +
          '<span class="cp-ms-title">' + escapeHtml(m.title) + '</span>' +
          (statusLabel ? '<span class="cp-ms-status">' + statusLabel + '</span>' : '') +
          (prog ? '<span class="cp-ms-status" style="color:var(--cp-muted)">' + escapeHtml(prog) + '</span>' : '') +
        '</span>' +
        '<span class="cp-ms-desc">' + escapeHtml(m.desc) + '</span>' +
        (detail ? '<span class="cp-ms-detail">' + escapeHtml(detail) + '</span>' : '') +
      '</span>' +
      '<span class="cp-ms-chip">' + escapeHtml(chip) + '</span>' +
    '</' + tag + '>';
  }

  function renderHome(data) {
    var w = data.working, li = data.levelInfo;
    var span = li.next ? (li.next.min - li.level.min) : 1;
    var into = li.next ? (data.xp - li.level.min) : span;
    var pct = Math.max(0, Math.min(100, Math.round((into / span) * 100)));
    var xpLabel = li.next
      ? (data.xp + ' XP, ' + (li.next.min - data.xp) + ' to ' + li.next.name)
      : (data.xp + ' XP, top level reached');

    var entries = milestoneStatusList(w, data.xp);
    var realTotal = 0, doneCount = 0, nextEntry = null;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].status === 'soon') continue;
      realTotal++;
      if (entries[i].done) doneCount++;
      if (!nextEntry && entries[i].status === 'next') nextEntry = entries[i];
    }

    var heroHtml =
      '<div class="cp-hero">' +
        '<div class="cp-hero-top">' +
          '<div><h1>Your path, ' + escapeHtml(SESSION.firstName) + '</h1>' +
          '<p>' + doneCount + ' of ' + realTotal + ' milestones reached. Each one is a real step toward knowing what comes after high school.</p></div>' +
          '<span class="cp-level-chip">' + icon('trophy') + escapeHtml(li.level.name) + '</span>' +
        '</div>' +
        '<div class="cp-xp-wrap">' +
          '<div class="cp-xp-labels"><span>Level progress</span><span>' + escapeHtml(xpLabel) + '</span></div>' +
          '<div class="cp-xp-track"><div class="cp-xp-fill" id="cp-xp-fill"></div></div>' +
        '</div>' +
        (!w.completed ? '<a class="cp-hero-cta" href="' + APTITUDE_URL + '" target="_blank" rel="noopener">Take the aptitude assessment' + icon('arrow') + '</a>' : '') +
      '</div>';

    var nudgeHtml = '';
    if (nextEntry) {
      nudgeHtml =
        '<div class="cp-nudge">' +
          '<span class="cp-nudge-icon" aria-hidden="true">' + icon(nextEntry.m.icon) + '</span>' +
          '<span class="cp-nudge-text"><strong>Up next:</strong> ' + escapeHtml(nextEntry.m.title) + '. ' + escapeHtml(nextEntry.m.desc) + '</span>' +
          '<button class="cp-nudge-btn" type="button" data-go="' + nextEntry.m.go + '">Go</button>' +
        '</div>';
    }

    var stagesHtml = '';
    for (i = 0; i < STAGES.length; i++) {
      var st = STAGES[i];
      var ms = entries.filter(function (e) { return e.m.stage === st.id; });
      if (!ms.length) continue;
      var isSoon = ms.every(function (e) { return e.status === 'soon'; });
      var stDone = 0, stReal = 0;
      var rows = '';
      for (var j = 0; j < ms.length; j++) {
        if (ms[j].status !== 'soon') { stReal++; if (ms[j].done) stDone++; }
        rows += msRowHtml(ms[j], w);
      }
      var meta = isSoon ? 'Coming soon' : (stDone === stReal ? 'Complete' : stDone + ' of ' + stReal);
      var stageClass = 'cp-card cp-stage' + (!isSoon && stDone === stReal ? ' cp-stage-done' : '') + (isSoon ? ' cp-stage-soon' : '');
      stagesHtml +=
        '<div class="' + stageClass + '">' +
          '<div class="cp-stage-head">' +
            '<span class="cp-stage-num" aria-hidden="true">' + ((!isSoon && stDone === stReal) ? icon('check') : st.num) + '</span>' +
            '<div><div class="cp-stage-title">' + escapeHtml(st.title) + '</div>' +
            '<div class="cp-ms-desc">' + escapeHtml(st.blurb) + '</div></div>' +
            '<span class="cp-stage-meta">' + escapeHtml(meta) + '</span>' +
          '</div>' +
          '<div class="cp-ms-list">' + rows + '</div>' +
        '</div>';
    }

    el('cp-screen-home').innerHTML = heroHtml + nudgeHtml + stagesHtml;

    bind('#cp-screen-home [data-go]', function (btn) {
      showScreen(btn.getAttribute('data-go'));
    });

    var fill = el('cp-xp-fill');
    if (fill) {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { fill.style.width = pct + '%'; });
      });
    }
  }

  /* ============================================================
     WHO I AM (built from the student's real assessment results)
     ============================================================ */

  function topDomains(w, n) {
    var entries = [];
    for (var k in w.p1Answers) entries.push({ key: k, score: w.p1Answers[k] });
    entries.sort(function (a, b) { return b.score - a.score; });
    return entries.slice(0, n || 3);
  }

  function archetypeName(w) {
    var top = topDomains(w, 2);
    if (top.length < 2 || top[0].score === 0) return 'The Explorer';
    var t1 = TRAITS[top[0].key], t2 = TRAITS[top[1].key];
    if (!t1 || !t2) return 'The Explorer';
    return 'The ' + t2.adj + ' ' + t1.noun;
  }

  function interestChart(w) {
    var entries = [];
    for (var k in w.p1Answers) entries.push({ key: k, score: w.p1Answers[k] });
    entries.sort(function (a, b) { return b.score - a.score; });
    var rowH = 34, labelW = 250, chartW = 640, barMax = chartW - labelW - 50;
    var svg = '<svg viewBox="0 0 ' + chartW + ' ' + (entries.length * rowH + 6) + '" width="100%" role="img" aria-label="Interest profile chart">';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var y = i * rowH + 4;
      var barW = Math.max(4, (e.score / 3) * barMax);
      var top = i < 3 && e.score > 0;
      svg += '<text class="cp-bar-label" x="' + (labelW - 10) + '" y="' + (y + 17) + '" text-anchor="end">' + escapeHtml(DOMAIN_TITLES[e.key] || e.key) + '</text>';
      svg += '<rect class="cp-bar-track" x="' + labelW + '" y="' + (y + 6) + '" width="' + barMax + '" height="14" rx="7"/>';
      svg += '<rect class="cp-bar-fill' + (top ? ' cp-bar-top' : '') + '" x="' + labelW + '" y="' + (y + 6) + '" width="' + barW + '" height="14" rx="7"/>';
      svg += '<text class="cp-bar-value" x="' + (labelW + barW + 8) + '" y="' + (y + 17) + '">' + e.score + '</text>';
    }
    svg += '</svg>';
    return svg;
  }

  function renderWhoIAm(data) {
    var w = data.working;
    var root = el('cp-screen-whoiam');

    if (!w.completed) {
      root.innerHTML =
        '<div class="cp-card cp-locked-state">' +
          '<div class="cp-item-icon">' + icon('lock') + '</div>' +
          '<h2 class="cp-section-title">Your profile is waiting</h2>' +
          '<p class="cp-section-sub">Finish the aptitude assessment to unlock who you are.</p>' +
          '<a class="cp-hero-cta" href="' + APTITUDE_URL + '" target="_blank" rel="noopener" style="margin-top:6px;background:var(--cp-green);color:#fff">Go to the assessment' + icon('arrow') + '</a>' +
        '</div>';
      return;
    }

    var top3 = topDomains(w, 3);
    var arch = archetypeName(w);
    var t1 = TRAITS[top3[0] ? top3[0].key : ''], t2 = TRAITS[top3[1] ? top3[1].key : ''];
    var narrative = 'Your results point somewhere specific. ' + (t1 ? t1.means : '') + (t2 ? ' ' + t2.means : '') +
      ' The fields below surfaced because of answers you actually gave, and each one shows its receipts.';

    var traitCards = '';
    for (var i = 0; i < top3.length; i++) {
      var t = TRAITS[top3[i].key];
      if (!t || top3[i].score === 0) continue;
      traitCards +=
        '<div class="cp-trait-card">' +
          '<div class="cp-trait-rank">Driver ' + (i + 1) + '</div>' +
          '<div class="cp-trait-name">' + escapeHtml(DOMAIN_TITLES[top3[i].key] || top3[i].key) + '</div>' +
          '<p class="cp-trait-means">' + escapeHtml(t.means) + '</p>' +
          '<div class="cp-trait-row"><span class="cp-trait-tag">Where you thrive</span><p>' + escapeHtml(t.thrive) + '</p></div>' +
          '<div class="cp-trait-row"><span class="cp-trait-tag cp-trait-tag-watch">Watch for</span><p>' + escapeHtml(t.watch) + '</p></div>' +
        '</div>';
    }

    // Operating style from the student's Part 2 answers, using the
    // module's own option labels.
    var styleCards = '';
    for (var domain in w.p2Answers) {
      var ans = w.p2Answers[domain];
      if (!ans) continue;
      var rows = '';
      if (ans.style && STYLE_OPTION_LABELS[domain] && STYLE_OPTION_LABELS[domain][ans.style]) {
        rows += '<div class="cp-style-row"><span class="cp-trait-tag">Your setting</span><p>' + escapeHtml(STYLE_OPTION_LABELS[domain][ans.style]) + '</p></div>';
      }
      if (ans.motivations && ans.motivations.length) {
        rows += '<div class="cp-style-row"><span class="cp-trait-tag">What drives you</span><p>' + escapeHtml(ans.motivations.join(' \u00b7 ')) + '</p></div>';
      }
      if (ans.frustration) {
        rows += '<div class="cp-style-row"><span class="cp-trait-tag cp-trait-tag-watch">What drains you</span><p>' + escapeHtml(ans.frustration) + '</p></div>';
      }
      if (!rows) continue;
      styleCards += '<div class="cp-trait-card"><div class="cp-trait-name" style="font-size:15px">' + escapeHtml(DOMAIN_TITLES[domain] || domain) + '</div>' + rows + '</div>';
    }

    // Matched fields straight from surfacing, with the "why" receipts.
    var matchHtml = '';
    for (i = 0; i < w.surfaced.length; i++) {
      var c = findCluster(w.surfaced[i]);
      if (!c) continue;
      var saved = w.clusters_saved.indexOf(c.id) !== -1;
      var meta = w.clusterMeta[c.id] || {};
      var reasons = (meta.reasons || []).slice(0, 2);
      var reasonsHtml = '';
      for (var rIdx = 0; rIdx < reasons.length; rIdx++) {
        reasonsHtml += '<li>' + escapeHtml(reasons[rIdx]) + '</li>';
      }
      matchHtml += '<div class="cp-item-card cp-field-card" style="cursor:default;--cluster-accent:' + escapeHtml(c.color || '#0F3D1E') + '">' +
        (saved ? '<div class="cp-state-tags"><span class="cp-state-tag cp-tag-saved">Saved</span></div>' : '') +
        '<div class="cp-field-dot" aria-hidden="true"></div>' +
        '<div class="cp-item-name">' + escapeHtml(c.title) + (meta.reinforced ? ' <span class="cp-strong-tag">Strong match</span>' : '') + '</div>' +
        '<div class="cp-item-blurb">' + escapeHtml(c.about || '') + '</div>' +
        (reasonsHtml ? '<div class="cp-why"><span class="cp-trait-tag">Why this appeared</span><ul>' + reasonsHtml + '</ul></div>' : '') +
        '<div class="cp-action-row" style="margin-top:8px">' +
          '<button class="cp-action-btn cp-btn-compare" data-explore-cluster="' + escapeHtml(c.id) + '" type="button" style="padding:7px 15px;font-size:13px">See these majors</button>' +
          (saved ? '' : '<button class="cp-action-btn cp-btn-save" data-save-cluster="' + escapeHtml(c.id) + '" type="button" style="padding:7px 15px;font-size:13px">' + icon('bookmark') + 'Save</button>') +
        '</div></div>';
    }

    var reflHtml = '';
    for (domain in w.p2Answers) {
      var pa = w.p2Answers[domain];
      if (!pa || !pa.reflect) continue;
      reflHtml += '<div class="cp-reflection-card"><span class="cp-refl-kind">From your assessment</span>' +
        '<div class="cp-refl-item">' + escapeHtml(DOMAIN_TITLES[domain] || domain) + '</div>' +
        '<div class="cp-refl-text">' + escapeHtml(pa.reflect) + '</div></div>';
    }
    var reflKeys = Object.keys(state.reflections).sort(function (a, b) { return state.reflections[a].ts - state.reflections[b].ts; });
    for (i = 0; i < reflKeys.length; i++) {
      var r = state.reflections[reflKeys[i]];
      var label = r.type === 'cluster' ? clusterTitle(r.id) : r.id;
      reflHtml += '<div class="cp-reflection-card"><span class="cp-refl-kind">Written here</span>' +
        '<div class="cp-refl-item">' + escapeHtml(label) + '</div>' +
        '<div class="cp-refl-text">' + escapeHtml(r.text) + '</div></div>';
    }
    if (!reflHtml) reflHtml = '<div class="cp-empty">Nothing yet. Open a major or field and hit Reflect.</div>';

    root.innerHTML =
      '<div class="cp-whoiam-hero">' +
        '<div class="cp-eyebrow" style="color:#a8d5a0">Who I Am</div>' +
        '<h1 class="cp-arch-name">' + escapeHtml(arch) + '</h1>' +
        '<p class="cp-arch-narrative">' + escapeHtml(narrative) + '</p>' +
      '</div>' +
      '<div class="cp-stack">' +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">Your top drivers</div>' +
          '<h2 class="cp-section-title">What actually motivates you</h2>' +
          '<p class="cp-section-sub">Your strongest signals from the assessment, and what each one means in the real world.</p>' +
          '<div class="cp-grid cp-grid-3 cp-trait-grid">' + traitCards + '</div>' +
        '</div>' +
        (styleCards ?
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">How you work</div>' +
          '<h2 class="cp-section-title">Your operating style</h2>' +
          '<p class="cp-section-sub">Pulled from your own deep-dive answers, not a stereotype.</p>' +
          '<div class="cp-grid cp-grid-3 cp-trait-grid">' + styleCards + '</div>' +
        '</div>' : '') +
        '<div class="cp-card cp-chart-wrap">' +
          '<div class="cp-eyebrow">The full picture</div>' +
          '<h2 class="cp-section-title">Your interest profile</h2>' +
          '<p class="cp-section-sub">Every signal from your quick check-in, scored 0 to 3. Your top three are highlighted.</p>' +
          interestChart(w) +
        '</div>' +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">Matched fields</div>' +
          '<h2 class="cp-section-title">Where your profile points</h2>' +
          '<p class="cp-section-sub">Each field shows exactly which of your answers put it here.</p>' +
          '<div class="cp-item-grid">' + matchHtml + '</div>' +
        '</div>' +
        '<div class="cp-card">' +
          '<div class="cp-eyebrow">In your own words</div>' +
          '<h2 class="cp-section-title">Your reflections</h2>' +
          '<div class="cp-grid cp-grid-2" style="margin-top:12px">' + reflHtml + '</div>' +
        '</div>' +
        '<p class="cp-footer-note" style="margin-top:0">Results shift as you grow. <a href="' + APTITUDE_URL + '" target="_blank" rel="noopener" style="color:var(--cp-green)">Retake the assessment</a> any time.</p>' +
      '</div>';

    bind('#cp-screen-whoiam [data-explore-cluster]', function (btn) {
      showScreen('majors', { cluster: btn.getAttribute('data-explore-cluster') });
    });
    bind('#cp-screen-whoiam [data-save-cluster]', function (btn) {
      var cid = btn.getAttribute('data-save-cluster');
      if (state.saves.clusters.indexOf(cid) === -1) state.saves.clusters.push(cid);
      saveState();
      trackAppend('clusters_saved', cid);
      recompute('Field saved.');
      renderAll();
    });

    if (!state.flags.whoiam_read && !isFirstBoot) {
      state.flags.whoiam_read = true;
      saveState();
      recompute('You read your profile. That is the whole point of this place.');
    }
  }

  /* ============================================================
     MY MAJORS (fields -> majors -> careers, from live content)
     ============================================================ */

  function stateTags(w, type, id) {
    var viewed = false, saved = false;
    if (type === 'major') { viewed = w.majors_viewed.indexOf(id) !== -1; saved = w.majors_saved.indexOf(id) !== -1; }
    if (type === 'cluster') { viewed = w.clusters_viewed.indexOf(id) !== -1; saved = w.clusters_saved.indexOf(id) !== -1; }
    if (type === 'career') { viewed = w.careers_viewed.indexOf(id) !== -1; }
    var html = '';
    if (saved) html += '<span class="cp-state-tag cp-tag-saved">Saved</span>';
    else if (viewed) html += '<span class="cp-state-tag cp-tag-viewed">Viewed</span>';
    return html ? '<div class="cp-state-tags">' + html + '</div>' : '';
  }

  function majorCard(w, title, clusterId) {
    var m = majorCatalog[title] || { whatItIs: '' };
    return '<button class="cp-item-card" data-open-major="' + escapeHtml(title) + '" type="button" style="--cluster-accent:' + escapeHtml(clusterColor(clusterId)) + '">' +
      stateTags(w, 'major', title) +
      '<div class="cp-field-dot" aria-hidden="true"></div>' +
      '<div class="cp-item-name">' + escapeHtml(title) + '</div>' +
      '<div class="cp-item-blurb">' + escapeHtml(m.whatItIs || '') + '</div>' +
      '<div class="cp-item-meta">' + escapeHtml(clusterTitle(clusterId)) + '</div></button>';
  }

  function markViewed(kind, id) {
    var w = getWorking();
    var changed = false;
    if (kind === 'major' && w.majors_viewed.indexOf(id) === -1) { state.views.majors.push(id); trackAppend('majors_viewed', id); changed = true; }
    if (kind === 'cluster' && w.clusters_viewed.indexOf(id) === -1) { state.views.clusters.push(id); trackAppend('clusters_viewed', id); changed = true; }
    if (kind === 'career' && w.careers_viewed.indexOf(id) === -1) { state.views.careers.push(id); changed = true; }
    if (changed) saveState();
    return changed;
  }

  function renderMajors(data) {
    var w = data.working;

    var surfacedSet = {};
    for (var i = 0; i < w.surfaced.length; i++) surfacedSet[w.surfaced[i]] = true;

    // Field chips: matched fields first, then the rest.
    var ordered = clusters.slice().sort(function (a, b) {
      return (surfacedSet[b.id] ? 1 : 0) - (surfacedSet[a.id] ? 1 : 0);
    });
    var filterHtml = '<div class="cp-filter-row"><span class="cp-item-meta">Field:</span>' +
      '<button class="cp-chip' + (majorsPrefs.cluster === 'all' ? ' cp-active' : '') + '" data-mfilter="all" type="button">All</button>';
    for (i = 0; i < ordered.length; i++) {
      filterHtml += '<button class="cp-chip' + (majorsPrefs.cluster === ordered[i].id ? ' cp-active' : '') + '" data-mfilter="' + escapeHtml(ordered[i].id) + '" type="button">' + escapeHtml(ordered[i].title) + (surfacedSet[ordered[i].id] ? ' (match)' : '') + '</button>';
    }
    filterHtml += '</div>';

    var sectionsHtml = '';
    if (majorsPrefs.cluster === 'all') {
      var matchedHtml = '', otherHtml = '';
      for (i = 0; i < clusters.length; i++) {
        var c = clusters[i];
        for (var j = 0; j < c.majors.length; j++) {
          var card = majorCard(w, c.majors[j], c.id);
          if (surfacedSet[c.id]) matchedHtml += card; else otherHtml += card;
        }
      }
      if (matchedHtml) {
        sectionsHtml += '<div class="cp-card"><div class="cp-eyebrow">Matched to your results</div>' +
          '<h3 class="cp-section-title" style="font-size:19px">Majors from your matched fields</h3>' +
          '<p class="cp-section-sub">These come from the fields your assessment surfaced. Open one, save it, reflect, or compare two fields.</p>' +
          '<div class="cp-item-grid">' + matchedHtml + '</div></div>';
      }
      if (otherHtml) {
        sectionsHtml += '<div class="cp-card"><div class="cp-eyebrow">Beyond your matches</div>' +
          '<h3 class="cp-section-title" style="font-size:19px">Worth a look anyway</h3>' +
          '<p class="cp-section-sub">Strong profiles still get surprised. These sit outside your matched fields.</p>' +
          '<div class="cp-item-grid">' + otherHtml + '</div></div>';
      }
    } else {
      var cl = findCluster(majorsPrefs.cluster);
      if (cl) {
        markViewed('cluster', cl.id);
        var meta = w.clusterMeta[cl.id] || {};
        var reasons = (meta.reasons || []).slice(0, 3).map(function (t) { return '<li>' + escapeHtml(t) + '</li>'; }).join('');
        var listBlock = function (label, arr) {
          if (!arr || !arr.length) return '';
          return '<div class="cp-detail-block"><h4>' + label + '</h4><ul>' + arr.map(function (x) { return '<li>' + escapeHtml(x) + '</li>'; }).join('') + '</ul></div>';
        };
        var cardsHtml = '';
        for (j = 0; j < cl.majors.length; j++) cardsHtml += majorCard(w, cl.majors[j], cl.id);
        sectionsHtml =
          '<div class="cp-card" style="--cluster-accent:' + escapeHtml(cl.color || '#0F3D1E') + '">' +
            '<div class="cp-eyebrow">' + (surfacedSet[cl.id] ? 'Matched field' : 'Career field') + '</div>' +
            '<h3 class="cp-section-title" style="font-size:21px">' + escapeHtml(cl.title) + '</h3>' +
            '<p class="cp-section-sub">' + escapeHtml(cl.about || '') + '</p>' +
            (reasons ? '<div class="cp-why" style="margin-bottom:12px"><span class="cp-trait-tag">Why this appeared</span><ul>' + reasons + '</ul></div>' : '') +
            '<div class="cp-grid cp-grid-2">' +
              listBlock('What students work on', cl.workOn) +
              listBlock('Learning often feels like', cl.learningFeels) +
            '</div>' +
            (cl.enjoy ? '<div class="cp-detail-block"><h4>Students often enjoy</h4><p>' + escapeHtml(cl.enjoy) + '</p></div>' : '') +
          '</div>' +
          '<div class="cp-card"><div class="cp-eyebrow">Majors in this field</div>' +
          '<div class="cp-item-grid" style="margin-top:12px">' + cardsHtml + '</div></div>';
      }
    }
    if (!sectionsHtml) sectionsHtml = '<div class="cp-card"><div class="cp-empty">Content is still loading. Give it a second and switch tabs back.</div></div>';

    // Comparisons strip (cluster comparisons, module format 'a vs b').
    var cmpHtml = '', seenCmp = {};
    for (i = 0; i < w.comparisons_made.length; i++) {
      var cm = String(w.comparisons_made[i]);
      var key = cmpKey(cm);
      if (seenCmp[key]) continue;
      seenCmp[key] = true;
      var parts = cm.split(' vs ');
      if (parts.length !== 2) continue;
      cmpHtml += '<button class="cp-item-card" data-recompare-a="' + escapeHtml(parts[0]) + '" data-recompare-b="' + escapeHtml(parts[1]) + '" type="button">' +
        '<div class="cp-item-icon">' + icon('scale') + '</div>' +
        '<div class="cp-item-name">' + escapeHtml(clusterTitle(parts[0])) + ' vs ' + escapeHtml(clusterTitle(parts[1])) + '</div>' +
        '<div class="cp-item-meta">Tap to reopen</div></button>';
    }

    el('cp-screen-majors').innerHTML =
      '<div class="cp-majors-head">' +
        '<div><div class="cp-eyebrow">My Majors</div>' +
        '<h2 class="cp-section-title">Fields and majors matched to who you are</h2>' +
        '<p class="cp-section-sub">Built from your assessment. Careers hide inside each major. Saving, reflecting, and comparing all clear trail stops.</p></div>' +
        '<button class="cp-action-btn cp-btn-compare" id="cp-open-compare" type="button">' + icon('scale') + 'Compare two fields</button>' +
      '</div>' +
      filterHtml +
      '<div class="cp-stack">' + sectionsHtml +
      (cmpHtml ? '<div class="cp-card"><div class="cp-eyebrow">Your comparisons</div><h3 class="cp-section-title" style="font-size:19px">Side by sides you have run</h3><div class="cp-item-grid" style="margin-top:12px">' + cmpHtml + '</div></div>' : '') +
      '</div>';

    bind('#cp-screen-majors [data-mfilter]', function (btn) {
      majorsPrefs.cluster = btn.getAttribute('data-mfilter');
      renderMajors(recompute(btn.getAttribute('data-mfilter') === 'all' ? null : 'You opened ' + clusterTitle(majorsPrefs.cluster) + '.', { silent: majorsPrefs.cluster === 'all' }));
    });
    bind('#cp-screen-majors [data-open-major]', function (btn) {
      openMajorDetail(btn.getAttribute('data-open-major'));
    });
    bind('#cp-screen-majors [data-recompare-a]', function (btn) {
      showComparison(btn.getAttribute('data-recompare-a'), btn.getAttribute('data-recompare-b'));
    });
    var oc = el('cp-open-compare');
    if (oc) oc.addEventListener('click', openComparePicker);
  }

  /* ============================================================
     MAJOR DETAIL MODAL (live catalog content + careers)
     ============================================================ */

  function openMajorDetail(title) {
    var m = majorCatalog[title];
    if (!m) return;
    var viewedNow = markViewed('major', title);

    function listBlock(label, arr, linkify) {
      if (!arr || !arr.length) return '';
      return '<div class="cp-detail-block"><h4>' + label + '</h4><ul>' + arr.map(function (x) {
        return '<li>' + (linkify ? careerLinkify(x) : escapeHtml(x)) + '</li>';
      }).join('') + '</ul></div>';
    }

    var w = getWorking();
    var isSaved = w.majors_saved.indexOf(title) !== -1;
    var rKey = 'major:' + title;
    var existingRefl = state.reflections[rKey];

    var blocks =
      (m.whatItIs ? '<div class="cp-detail-block"><h4>What is this?</h4><p>' + escapeHtml(m.whatItIs) + '</p></div>' : '') +
      listBlock('What you study', m.whatYouStudy) +
      listBlock('What projects feel like', m.whatProjectsFeelLike) +
      listBlock('Good to know', m.goodToKnow) +
      listBlock('Examples of career direction', m.careerExamples, true) +
      listBlock('Try it in high school', m.tryItInHS);

    var actions = '<div class="cp-action-row">' +
      '<button class="cp-action-btn cp-btn-save" id="cp-act-save" type="button"' + (isSaved ? ' disabled' : '') + '>' + icon(isSaved ? 'check' : 'bookmark') + (isSaved ? 'Saved' : 'Save') + '</button>' +
      '<button class="cp-action-btn cp-btn-reflect" id="cp-act-reflect" type="button">' + icon('pencil') + (existingRefl ? 'Edit reflection' : 'Reflect') + '</button>' +
      '<button class="cp-action-btn cp-btn-compare" id="cp-act-schools" type="button">' + icon('map') + 'Find schools for this</button>' +
    '</div><p class="cp-xp-hint">Saving, reflecting, and opening career spotlights all count toward milestones on your path.</p>';

    var reflBlock = existingRefl
      ? '<div class="cp-reflect-saved" id="cp-refl-display"><strong>Your reflection</strong>' + escapeHtml(existingRefl.text) + '</div>'
      : '';

    openModal(
      '<div class="cp-modal-head"><div><div class="cp-eyebrow">' + escapeHtml(clusterTitle(m.clusterId)) + '</div>' +
      '<h2 class="cp-modal-title">' + escapeHtml(title) + '</h2></div>' +
      '<button class="cp-modal-close" id="cp-modal-close" type="button" aria-label="Close">' + icon('x') + '</button></div>' +
      blocks + actions + reflBlock +
      '<div id="cp-reflect-slot"></div>'
    );
    bindCareerLinks('#cp-modal-root');

    if (viewedNow) recompute('You opened ' + title + ' for the first time.');
    else recompute(null, { silent: true });

    var saveBtn = el('cp-act-save');
    if (saveBtn) saveBtn.addEventListener('click', function () {
      if (state.saves.majors.indexOf(title) === -1) state.saves.majors.push(title);
      saveState();
      trackAppend('majors_saved', title);
      saveBtn.disabled = true;
      saveBtn.innerHTML = icon('check') + 'Saved';
      recompute('Saved to your path.');
      renderAll();
    });

    var schoolsBtn = el('cp-act-schools');
    if (schoolsBtn) schoolsBtn.addEventListener('click', function () {
      schoolsPrefs.major = title;
      closeModal();
      showScreen('schools');
    });

    var reflBtn = el('cp-act-reflect');
    if (reflBtn) reflBtn.addEventListener('click', function () {
      var slot = el('cp-reflect-slot');
      if (!slot || slot.innerHTML) return;
      slot.innerHTML =
        '<div class="cp-reflect-form">' +
          '<label for="cp-refl-text">Could you see yourself here? What surprised you?</label>' +
          '<textarea id="cp-refl-text" maxlength="1000" placeholder="A sentence or two is plenty."></textarea>' +
          '<div class="cp-action-row"><button class="cp-action-btn cp-btn-reflect" id="cp-refl-submit" type="button">' + icon('check') + 'Save reflection</button></div>' +
        '</div>';
      var existing = state.reflections[rKey];
      var ta = el('cp-refl-text');
      if (existing && ta) ta.value = existing.text;
      if (ta) ta.focus();
      el('cp-refl-submit').addEventListener('click', function () {
        var text = (ta.value || '').trim();
        if (!text) { ta.focus(); return; }
        var firstTime = !state.reflections[rKey];
        state.reflections[rKey] = { type: 'major', id: title, text: text, ts: Date.now() };
        saveState();
        slot.innerHTML = '';
        var disp = el('cp-refl-display');
        var safe = '<strong>Your reflection</strong>' + escapeHtml(text);
        if (disp) { disp.innerHTML = safe; }
        else {
          var d = document.createElement('div');
          d.className = 'cp-reflect-saved'; d.id = 'cp-refl-display';
          d.innerHTML = safe;
          slot.parentNode.insertBefore(d, slot);
        }
        recompute(firstTime ? 'Reflection saved. This is the real work.' : null, { silent: !firstTime });
        if (!firstTime) toast('badge', 'Updated', 'Reflection updated.');
        renderAll();
      });
    });
  }

  /* ============================================================
     CAREER DRAWER (live career abstracts, opened from major details)
     ============================================================ */

  function openCareerDrawer(careerKey) {
    var career = CAREER_ABSTRACTS[careerKey];
    if (!career) return;
    var viewedNow = markViewed('career', careerKey);
    var html = '';
    for (var i = 0; i < career.sections.length; i++) {
      var s = career.sections[i];
      html += '<div class="cp-detail-block"><h4>' + escapeHtml(s.h) + '</h4>';
      if (s.p) html += '<p>' + escapeHtml(s.p) + '</p>';
      if (s.bullets) {
        html += '<ul>';
        for (var j = 0; j < s.bullets.length; j++) html += '<li>' + escapeHtml(s.bullets[j]) + '</li>';
        html += '</ul>';
      }
      html += '</div>';
    }
    openModal(
      '<div class="cp-modal-head"><div><div class="cp-eyebrow">Career spotlight</div>' +
      '<h2 class="cp-modal-title">' + escapeHtml(career.title) + '</h2></div>' +
      '<button class="cp-modal-close" id="cp-modal-close" type="button" aria-label="Close">' + icon('x') + '</button></div>' +
      html,
      { keepBehind: true }
    );
    if (viewedNow) recompute('Career spotlight opened: ' + career.title + '.');
    else recompute(null, { silent: true });
  }

  /* ============================================================
     FIELD COMPARISON (cluster vs cluster, module format)
     ============================================================ */

  function compareCol(c) {
    function listPart(label, arr) {
      if (!arr || !arr.length) return '';
      return '<h5>' + label + '</h5><ul>' + arr.map(function (x) { return '<li>' + escapeHtml(x) + '</li>'; }).join('') + '</ul>';
    }
    return '<div class="cp-compare-col" style="--cluster-accent:' + escapeHtml(c.color || '#0F3D1E') + '">' +
      '<h3 class="cp-compare-title">' + escapeHtml(c.title) + '</h3>' +
      '<p class="cp-compare-about">' + escapeHtml(c.about || '') + '</p>' +
      listPart('What students work on', c.workOn) +
      listPart('Learning often feels like', c.learningFeels) +
      (c.enjoy ? '<h5>Students often enjoy</h5><p class="cp-compare-about">' + escapeHtml(c.enjoy) + '</p>' : '') +
    '</div>';
  }

  function showComparison(aId, bId) {
    var a = findCluster(aId), b = findCluster(bId);
    if (!a || !b) return;
    openModal(
      '<div class="cp-modal-head"><div><div class="cp-eyebrow">Side by side</div>' +
      '<h2 class="cp-modal-title">' + escapeHtml(a.title) + ' vs ' + escapeHtml(b.title) + '</h2></div>' +
      '<button class="cp-modal-close" id="cp-modal-close" type="button" aria-label="Close">' + icon('x') + '</button></div>' +
      '<p class="cp-modal-sub">Comparison is about how studying can feel, not which one is better.</p>' +
      '<div class="cp-compare-cols">' + compareCol(a) + compareCol(b) + '</div>'
    );
  }

  function recordComparison(aId, bId) {
    var entry = aId + ' vs ' + bId;
    var key = cmpKey(entry);
    var exists = false;
    var all = getWorking().comparisons_made;
    for (var i = 0; i < all.length; i++) if (cmpKey(all[i]) === key) exists = true;
    if (!exists) {
      state.comparisons.push(entry);
      saveState();
      trackAppend('comparisons_made', entry);
    }
    showComparison(aId, bId);
    recompute(exists ? null : 'Comparison complete.', { silent: exists });
  }

  var comparePick = null;

  function openComparePicker() {
    comparePick = null;
    renderComparePicker();
  }

  function renderComparePicker() {
    var w = getWorking();
    var surfacedSet = {};
    for (var i = 0; i < w.surfaced.length; i++) surfacedSet[w.surfaced[i]] = true;

    var suggested = canonicalComparisons.slice().sort(function (p, q) {
      var sp = (surfacedSet[p[0]] ? 1 : 0) + (surfacedSet[p[1]] ? 1 : 0);
      var sq = (surfacedSet[q[0]] ? 1 : 0) + (surfacedSet[q[1]] ? 1 : 0);
      return sq - sp;
    }).slice(0, 4);

    var sugHtml = '';
    for (i = 0; i < suggested.length; i++) {
      var pair = suggested[i];
      if (!findCluster(pair[0]) || !findCluster(pair[1])) continue;
      sugHtml += '<button class="cp-item-card" data-cmp-a="' + escapeHtml(pair[0]) + '" data-cmp-b="' + escapeHtml(pair[1]) + '" type="button">' +
        '<div class="cp-item-icon">' + icon('scale') + '</div>' +
        '<div class="cp-item-name">' + escapeHtml(clusterTitle(pair[0])) + ' vs ' + escapeHtml(clusterTitle(pair[1])) + '</div>' +
        '<div class="cp-item-meta">Suggested</div></button>';
    }

    var ordered = clusters.slice().sort(function (a, b) {
      return (surfacedSet[b.id] ? 1 : 0) - (surfacedSet[a.id] ? 1 : 0);
    });
    var pickHtml = '';
    for (i = 0; i < ordered.length; i++) {
      var c = ordered[i];
      var picked = comparePick === c.id;
      pickHtml += '<button class="cp-chip' + (picked ? ' cp-active' : '') + '" data-cmp-pick="' + escapeHtml(c.id) + '" type="button">' + escapeHtml(c.title) + (surfacedSet[c.id] ? ' (match)' : '') + '</button>';
    }

    openModal(
      '<div class="cp-modal-head"><div><div class="cp-eyebrow">Compare</div>' +
      '<h2 class="cp-modal-title">Pick two fields</h2></div>' +
      '<button class="cp-modal-close" id="cp-modal-close" type="button" aria-label="Close">' + icon('x') + '</button></div>' +
      '<p class="cp-modal-sub">' + (comparePick ? 'First pick: ' + escapeHtml(clusterTitle(comparePick)) + '. Now pick the second.' : 'Start from a suggested pairing, or pick any two fields yourself.') + '</p>' +
      (comparePick ? '' : '<div class="cp-item-grid" style="margin-bottom:14px">' + sugHtml + '</div>') +
      '<div class="cp-filter-row" style="margin-bottom:0">' + pickHtml + '</div>'
    );

    bind('#cp-modal-root [data-cmp-a]', function (btn) {
      recordComparison(btn.getAttribute('data-cmp-a'), btn.getAttribute('data-cmp-b'));
    });
    bind('#cp-modal-root [data-cmp-pick]', function (btn) {
      var cid = btn.getAttribute('data-cmp-pick');
      if (!comparePick) { comparePick = cid; renderComparePicker(); return; }
      if (comparePick === cid) { comparePick = null; renderComparePicker(); return; }
      var a = comparePick; comparePick = null;
      recordComparison(a, cid);
    });
  }

  /* ============================================================
     MODAL
     ============================================================ */

  function openModal(inner) {
    var root = el('cp-modal-root');
    root.innerHTML = '<div class="cp-modal-overlay" id="cp-modal-overlay"><div class="cp-modal" role="dialog" aria-modal="true">' + inner + '</div></div>';
    var overlay = el('cp-modal-overlay');
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
    var close = el('cp-modal-close');
    if (close) close.addEventListener('click', closeModal);
  }

  function closeModal() {
    el('cp-modal-root').innerHTML = '';
    renderAll();
  }

  /* ============================================================
     MY SCHOOLS (real school search via the College Scorecard
     Edge Function, same query engine as the module)
     ============================================================ */

  var schoolsPrefs = {
    major: null, mode: 'zip', zip: '', radius: '25',
    states: [], sizes: [], campuses: [], useProgram: true
  };
  var schoolResults = null;   // last raw results
  var schoolSearchBusy = false;
  var schoolSearchError = '';

  var US_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC'];

  function majorOptionsFor(w) {
    // Saved majors first, then viewed, then everything in the catalog.
    var seen = {}, out = [];
    function push(name) {
